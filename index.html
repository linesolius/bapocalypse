<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Community</title>

<style>
/* 1. 전체 베이스: 눈이 편한 다크 모드 */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#b8c7b0; line-height:1.5;} 
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin-right:6px;cursor:pointer}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}

/* 2. 게시글 카드 및 제목 */
.card{background:#111611;padding:25px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.15);cursor:pointer}
.meta{font-size:12px;color:#78a378;margin-bottom:10px}
.card h2 { color: #8fbc8f; margin-bottom: 15px; font-size: 1.5rem; } 
.card h3 { color: #a3d9a5; font-size: 1.2rem; } 

/* 배지 스타일 */
.badge { padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 5px; border: 1px solid; }
.pending-badge { background: #442222; color: #ff5555; border-color: #ff5555; }
.update-badge { background: #1a2a3a; color: #55aaff; border-color: #55aaff; }

/* 3. 댓글 가독성 개선 */
.comment-section-title { margin: 30px 0 15px; color: #8fbc8f; font-size: 1.1rem; border-bottom: 1px solid rgba(0,255,0,0.1); padding-bottom: 5px;}
.comment { margin-top: 15px; padding: 15px; background: #141a14; border-left: 3px solid #4a634a; border-radius: 4px; }
.comment b { color: #9cff57; font-size: 14px; display: block; margin-bottom: 5px; }
.comment .comment-text { color: #d1d1d1; font-size: 14px; white-space: pre-wrap; margin-bottom: 8px; }

.reply { margin-left: 20px; margin-top: 10px; padding: 12px; background: #0d120d; border-left: 2px solid #334433; border-radius: 4px; }
.reply b { color: #7dff4f; font-size: 13px; }
.reply .reply-text { color: #b0b0b0; font-size: 13px; margin-top: 4px; }

/* 4. 기타 UI 요소 */
textarea,input,select{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:10px}
.action-btn{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin:8px 4px 0 0;cursor:pointer; font-size: 12px;}
hr{margin:25px 0;border:0;border-top:1px solid rgba(0,255,0,.15)}
.time{font-size:11px;color:#5a6b57;margin-top:5px;}
.comment-count{font-size:12px;color:#7dff4f;margin-top:6px;}
.post-image{max-width:100%;margin-top:15px;border-radius:6px; border: 1px solid #222;}
.comment-image{max-width:200px;margin-top:8px;border-radius:6px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999;}
.modal-box{background:#111611;padding:25px;border:1px solid #2aff00;width:300px;}
.pagination {text-align:center; margin-top:20px;}
.page-info {margin:0 15px; font-weight:bold; color:#9cff57;}
footer{text-align:center; padding:40px; color:#444; font-size:12px;}
</style>
</head>

<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="renderWrite()">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>

<footer>© 2033 Nuclear Community</footer>

<div id="passwordModal" class="modal">
<div class="modal-box">
<h3 id="modalTitle">비밀번호 입력</h3>
<input type="password" id="pwInput">
<button class="action-btn" id="pwConfirm">확인</button>
<button class="action-btn" onclick="document.getElementById('passwordModal').style.display='none'">취소</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_DELETE_CODE="porygon2007"
const ADMIN_PIN_CODE="torso1989"

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const postsRef=ref(db,'posts')

let allPosts={}
let currentPostKey=null
let currentCategory="all"
let currentPage = 1;
let isAdminView = false;
const POSTS_PER_PAGE = 10;

// 비밀 단축키 감지: Ctrl + Shift + A
window.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.code === 'KeyA') {
        e.preventDefault();
        openPasswordModal("ADMIN ACCESS", (pw)=>{
            if(pw === ADMIN_PIN_CODE){
                isAdminView = !isAdminView;
                alert(isAdminView ? "관리자 모드 활성화: 수정 신청된 내용이 미리 보입니다." : "관리자 모드 해제");
                renderList();
            } else { alert("ACCESS DENIED"); }
        });
    }
});

function truncateTitle(title){
if(title.length>15){ return title.slice(0,15)+"..." }
return title
}

function openPasswordModal(title, callback){
document.getElementById("modalTitle").innerText = title;
const modal=document.getElementById("passwordModal")
modal.style.display="flex"
document.getElementById("pwConfirm").onclick=function(){
const pw=document.getElementById("pwInput").value
modal.style.display="none"
document.getElementById("pwInput").value=""
callback(pw)
}
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{}
if(currentPostKey){renderDetail(currentPostKey)}else{renderList()}
})

function countComments(post){
let count=0
if(!post.comments) return 0
Object.values(post.comments).forEach(c=>{
count++
if(c.replies) count+=Object.keys(c.replies).length
})
return count
}

window.filterCategory=function(category){
currentCategory=category; currentPage=1; renderList()
}

window.changePage=function(direction){
  currentPage += direction; renderList();
}

window.renderList=function(){
currentPostKey=null
const container=document.getElementById('postList')
container.innerHTML=''

let postsArray=Object.entries(allPosts)

postsArray=postsArray.filter(([k,p])=>{
    if(!isAdminView && p.approved !== true) return false;
    if(p.pinned === true) return true; 
    if(currentCategory==="all") return true
    return p.category===currentCategory
})

postsArray.sort((a,b)=>{
if(a[1].pinned&&!b[1].pinned)return -1
if(!a[1].pinned&&b[1].pinned)return 1
return b[1].date-a[1].date
})

if(isAdminView) {
    const info = document.createElement('div');
    info.style.padding="10px"; info.style.background="#1a2233"; info.style.color="#55aaff"; info.style.marginBottom="20px"; info.style.fontSize="12px"; info.style.border="1px solid #55aaff";
    info.innerHTML = "<strong>[ADMIN MODE]</strong> 수정 신청된 글은 파란색 배지와 함께 수정된 내용으로 표시됩니다.";
    container.appendChild(info);
}

const totalPosts = postsArray.length;
const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE) || 1;
if(currentPage > totalPages) currentPage = totalPages;

const startIndex = (currentPage - 1) * POSTS_PER_PAGE;
const paginatedPosts = postsArray.slice(startIndex, startIndex + POSTS_PER_PAGE);

paginatedPosts.forEach(([key,post])=>{
const card=document.createElement('div')
card.className='card'
if(post.pinned) card.style.borderColor = "rgba(42, 255, 0, 0.5)";

// 핵심: 관리자 모드일 경우 수정 대기중인 데이터(pendingUpdate)를 우선 참조
const displayData = (isAdminView && post.pendingUpdate) ? post.pendingUpdate : post;

card.onclick=()=>renderDetail(key)
card.innerHTML=`
<div class='meta'>[${displayData.category}] ${escapeHTML(post.nickname)}</div>
<h3>
    ${isAdminView && !post.approved ? '<span class="badge pending-badge">WAITING</span>' : ''}
    ${isAdminView && post.pendingUpdate ? '<span class="badge update-badge">PREVIEW EDIT</span>' : ''}
    ${displayData.pinned?'📌 ':''}${escapeHTML(truncateTitle(displayData.title))}
</h3>
<div class="time">${formatTime(post.date)}</div>
<div class="comment-count">💬 ${countComments(post)}</div>
`
container.appendChild(card)
})

if(totalPosts > 0) {
  const pDiv = document.createElement('div');
  pDiv.className = 'pagination';
  pDiv.innerHTML = `
    <button class="action-btn" onclick="changePage(-1)" ${currentPage===1?'disabled style="opacity:0.3"':''}>&lt; PREV</button>
    <span class="page-info">${currentPage} / ${totalPages}</span>
    <button class="action-btn" onclick="changePage(1)" ${currentPage===totalPages?'disabled style="opacity:0.3"':''}>NEXT &gt;</button>
  `;
  container.appendChild(pDiv);
}
}

window.renderWrite=function(){
const container=document.getElementById('postList')
container.innerHTML=`
<div class="card" style="cursor:default">
<h2>NEW POST</h2>
<select id="w_category">
<option>잡담</option><option>정보</option><option>질문</option>
<option>거래</option><option>도움</option>
<option style="color:#ff5757">공지 (관리자 전용)</option>
</select>
<label style="display:block;margin-top:10px; font-size:12px;">
<input type="checkbox" id="w_pin" style="width:auto; margin-top:0;"> 상단 고정 (관리자 전용)
</label>
<input id="w_admin" placeholder="관리자 코드 (공지/고정 시 필요)">
<input id="w_nick" placeholder="닉네임">
<input id="w_pass" type="password" placeholder="비밀번호">
<input id="w_title" placeholder="제목">
<textarea id="w_content" placeholder="내용을 입력하세요..." style="height:200px"></textarea>
<input id="w_image" placeholder="이미지 URL (선택사항)">
<button class="action-btn" onclick="submitPost()">게시하기</button>
<button class="action-btn" onclick="renderList()">취소</button>
</div>
`
}

window.submitPost=function(){
const isPinned = document.getElementById('w_pin').checked;
const category = document.getElementById('w_category').value;
const adminInput = document.getElementById('w_admin').value;
let shouldApprove = (category.includes("공지") || isPinned) && adminInput === ADMIN_PIN_CODE;

if((category.includes("공지") || isPinned) && adminInput !== ADMIN_PIN_CODE){
    alert("관리자 권한이 없습니다."); return;
}

push(postsRef,{
category: category.includes("공지") ? "공지" : category,
nickname:document.getElementById('w_nick').value,
password:document.getElementById('w_pass').value,
title:document.getElementById('w_title').value,
content:document.getElementById('w_content').value,
image:document.getElementById('w_image').value||"",
pinned:isPinned,
approved:shouldApprove, 
date:Date.now()
})
alert(shouldApprove ? "게시되었습니다." : "등록되었습니다. 승인 후 표시됩니다.");
currentPage = 1; renderList()
}

// 수정 화면
window.editPost=function(key){
    const post = allPosts[key];
    openPasswordModal("수정 비밀번호 확인", (pw)=>{
        if(pw === post.password || pw === MASTER_DELETE_CODE){
            const container=document.getElementById('postList');
            // 관리자면 대기내역 수정, 아니면 현재내역 기준 수정
            const data = post.pendingUpdate || post;
            container.innerHTML=`
            <div class="card" style="cursor:default">
            <h2>EDIT POST ${post.pendingUpdate ? '(승인 대기중 내용)' : ''}</h2>
            <select id="e_category">
                <option ${data.category==='잡담'?'selected':''}>잡담</option>
                <option ${data.category==='정보'?'selected':''}>정보</option>
                <option ${data.category==='질문'?'selected':''}>질문</option>
                <option ${data.category==='거래'?'selected':''}>거래</option>
                <option ${data.category==='도움'?'selected':''}>도움</option>
                <option ${data.category==='공지'?'selected':''}>공지</option>
            </select>
            <label style="display:block;margin-top:10px; font-size:12px;">
                <input type="checkbox" id="e_pin" style="width:auto" ${data.pinned?'checked':''}> 상단 고정 (관리자 전용)
            </label>
            <input id="e_admin" placeholder="관리자 코드 (즉시 반영 시 필요)">
            <input id="e_title" value="${escapeHTML(data.title)}" placeholder="제목">
            <textarea id="e_content" style="height:200px" placeholder="내용">${escapeHTML(data.content)}</textarea>
            <input id="e_image" value="${data.image||''}" placeholder="이미지 URL">
            <button class="action-btn" onclick="updatePost('${key}')">수정 신청</button>
            <button class="action-btn" onclick="renderDetail('${key}')">취소</button>
            </div>`;
        } else { alert("비밀번호가 틀립니다."); }
    });
}

// 수정 처리
window.updatePost=function(key){
    const post = allPosts[key];
    const isPinned = document.getElementById('e_pin').checked;
    const category = document.getElementById('e_category').value;
    const adminInput = document.getElementById('e_admin').value;

    const editData = {
        category: category,
        pinned: isPinned,
        title: document.getElementById('e_title').value,
        content: document.getElementById('e_content').value,
        image: document.getElementById('e_image').value
    };

    if(adminInput === ADMIN_PIN_CODE){
        update(ref(db, 'posts/'+key), { ...editData, pendingUpdate: null }).then(()=>{
            alert("관리자 권한으로 즉시 수정되었습니다.");
            renderDetail(key);
        });
    } else {
        update(ref(db, 'posts/'+key+'/pendingUpdate'), editData).then(()=>{
            alert("수정 신청이 완료되었습니다. 관리자 승인 후 반영됩니다.");
            renderDetail(key);
        });
    }
}

// 수정 승인 (관리자 전용)
window.approveUpdate = function(key){
    const post = allPosts[key];
    if(!post.pendingUpdate) return;
    update(ref(db, 'posts/'+key), { ...post.pendingUpdate, pendingUpdate: null }).then(()=>{
        alert("수정 내용이 승인 및 반영되었습니다.");
        renderDetail(key);
    });
}

// 수정 반려 (대기 데이터 삭제)
window.rejectUpdate = function(key){
    if(confirm("수정 신청을 반려하시겠습니까? 신청된 내용은 삭제됩니다.")){
        update(ref(db, 'posts/'+key), { pendingUpdate: null }).then(()=>{
            alert("수정 신청이 반려되었습니다.");
            renderDetail(key);
        });
    }
}

window.renderDetail = function(key){
currentPostKey=key
const post=allPosts[key]
const container=document.getElementById('postList')

// 핵심: 관리자 모드일 경우 수정 대기내용을 보여줌
const isPreview = isAdminView && post.pendingUpdate;
const displayData = isPreview ? post.pendingUpdate : post;

let commentsHTML=""
if(post.comments){
Object.entries(post.comments).forEach(([cid,c])=>{
commentsHTML+=`
<div class='comment'>
<b>${escapeHTML(c.nickname)}</b>
<div class="comment-text">${escapeHTML(c.content)}</div>
${c.image?`<img src="${c.image}" class="comment-image">`:""}
<div class="time">${formatTime(c.date)}</div>
<button class="action-btn" onclick="toggleReply('${cid}')">답글달기</button>
<button class="action-btn" style="opacity:0.6" onclick="deleteComment('${key}','${cid}','${c.password}')">삭제</button>
<div id="replyBox-${cid}" style="display:none; margin-top:15px; border-top:1px dashed #222; padding-top:10px;">
<input id="r_nick-${cid}" placeholder="닉네임" style="width:48%"><input id="r_pass-${cid}" type="password" placeholder="비밀번호" style="width:48%">
<textarea id="r_content-${cid}" placeholder="답글 내용을 입력하세요"></textarea>
<button class="action-btn" onclick="submitReply('${key}','${cid}')">답글등록</button>
</div>`
if(c.replies){
Object.entries(c.replies).forEach(([rid,r])=>{
commentsHTML+=`<div class='reply'><b>└ ${escapeHTML(r.nickname)}</b><div class="reply-text">${escapeHTML(r.content)}</div><div class="time">${formatTime(r.date)}</div><button class="action-btn" style="opacity:0.5; padding:2px 6px;" onclick="deleteReply('${key}','${cid}','${rid}','${r.password}')">삭제</button></div>`
})
}
commentsHTML+="</div>"
})
}

container.innerHTML=`
<div class='card' style="cursor:default">
<div style="display:flex; justify-content:space-between; align-items:flex-start;">
    <button class='action-btn' onclick="renderList()">← 목록으로</button>
    <div>
        ${(isAdminView && !post.approved) ? `<button class='action-btn' style="background:#2a442a" onclick="approvePost('${key}')">신규 승인</button>` : ''}
        ${(isAdminView && post.pendingUpdate) ? `
            <button class='action-btn' style="background:#223344; border-color:#55aaff; color:#55aaff" onclick="approveUpdate('${key}')">수정 승인</button>
            <button class='action-btn' style="border-color:#ff5555; color:#ff5555" onclick="rejectUpdate('${key}')">수정 반려</button>
        ` : ''}
        <button class='action-btn' style="border-color:#2aff00; color:#9cff57" onclick="editPost('${key}')">글 수정</button>
        <button class='action-btn' style="border-color:#555; color:#888" onclick="deletePost('${key}','${post.password}')">글 삭제</button>
    </div>
</div>
<hr>
${isPreview ? `<div style="background:#1a2233; color:#55aaff; padding:10px; border-radius:4px; font-size:12px; margin-bottom:15px; border:1px solid #55aaff;">⚠️ 현재 <b>수정된 내용</b>을 미리보고 있습니다. (승인 전까지 일반 유저는 이전 내용을 봅니다)</div>` : ''}
${(!isAdminView && post.pendingUpdate) ? `<div style="color:#55aaff; font-size:12px; margin-bottom:10px;">! 이 글은 현재 내용 수정을 신청하여 승인 대기 중입니다.</div>` : ''}
<h2>${displayData.pinned?'📌 ':''}${escapeHTML(displayData.title)}</h2>
<div class='meta'>작성자: ${escapeHTML(post.nickname)} | 카테고리: ${displayData.category} | ${formatTime(post.date)}</div>
<p style="color: #d1d1d1; margin: 25px 0; line-height: 1.8; font-size:15px; white-space:pre-wrap;">${escapeHTML(displayData.content)}</p>
${displayData.image?`<img src="${displayData.image}" class="post-image">`:""}
<h3 class="comment-section-title">Comments</h3>
${commentsHTML}
<div style="background:#0a0d0a; padding:15px; border-radius:4px; margin-top:30px; border:1px solid #1a2a1a;">
    <h3 style="font-size:14px; margin-bottom:10px;">댓글 쓰기</h3>
    <div style="display:flex; justify-content:space-between;">
        <input id='c_nick' placeholder='닉네임' style="width:49%"><input id='c_pass' type='password' placeholder='비밀번호' style="width:49%">
    </div>
    <textarea id='c_content' placeholder='댓글을 남겨주세요...' style="height:80px"></textarea>
    <input id='c_image' placeholder='이미지 URL (선택)'>
    <button class='action-btn' style="width:100%; padding:10px; margin-top:10px; background:#1a2a1a;" onclick="submitComment('${key}')">댓글 등록</button>
</div>
</div>`
}

window.approvePost = function(key){
    update(ref(db, 'posts/'+key), { approved: true }).then(()=>{
        alert("게시글이 승인되었습니다."); renderDetail(key);
    });
}

window.submitComment=function(postKey){
    const nick = document.getElementById('c_nick').value;
    const content = document.getElementById('c_content').value;
    if(!nick || !content){ alert("내용을 입력해주세요"); return; }
    push(ref(db,'posts/'+postKey+'/comments'),{ nickname:nick, password:document.getElementById('c_pass').value, content:content, image:document.getElementById('c_image').value||"", date:Date.now() })
}

window.submitReply=function(postKey,commentKey){
    const nick = document.getElementById("r_nick-"+commentKey).value;
    const content = document.getElementById("r_content-"+commentKey).value;
    if(!nick || !content){ alert("내용을 입력해주세요"); return; }
    push(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies'),{ nickname:nick, password:document.getElementById("r_pass-"+commentKey).value, content:content, date:Date.now() })
}

window.deletePost=function(key,password){
    openPasswordModal("글 삭제 인증", (input)=>{
        if(input===password || input===MASTER_DELETE_CODE){ remove(ref(db,'posts/'+key)).then(()=>{ currentPostKey=null; renderList(); }) }
        else{ alert("비밀번호 불일치"); }
    })
}

window.deleteComment=function(postKey,commentKey,password){
    openPasswordModal("댓글 삭제 인증", (input)=>{
        if(input===password || input===MASTER_DELETE_CODE){ remove(ref(db,'posts/'+postKey+'/comments/'+commentKey)).then(()=>{ renderDetail(postKey) }) }
        else{ alert("비밀번호 불일치"); }
    })
}

window.deleteReply=function(postKey,commentKey,replyKey,password){
    openPasswordModal("답글 삭제 인증", (input)=>{
        if(input===password || input===MASTER_DELETE_CODE){ remove(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies/'+replyKey)).then(()=>{ renderDetail(postKey) }) }
        else{ alert("비밀번호 불일치"); }
    })
}

window.toggleReply=function(cid){ const box=document.getElementById("replyBox-"+cid); box.style.display=box.style.display==="none"?"block":"none"; }

function formatTime(timestamp){
    const d=new Date(timestamp); const pad = (n) => n.toString().padStart(2, '0');
    return `2033.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
}

function escapeHTML(str){ return str?str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;"):"" }
