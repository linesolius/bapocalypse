<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{
  background:#132013;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:6px 12px;
  margin-right:6px;
  cursor:pointer;
}
nav button:hover{ box-shadow:0 0 8px #2aff00; }

.write-btn{
  background:#1a2a1a;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px 14px;
  cursor:pointer;
}

.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}

textarea,input,select{
  width:100%;
  margin-top:10px;
  background:#0f140f;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
}

.action-btn{
  background:#132013;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:6px 12px;
  margin:6px 4px 6px 0;
  cursor:pointer;
}
.action-btn:hover{ box-shadow:0 0 10px #2aff00; }

.reply-box{
  margin-left:25px;
  margin-top:10px;
  padding:10px;
  background:#0f180f;
  border:1px solid rgba(0,255,0,0.2);
  display:none;
}

.uploaded-image{
  max-width:100%;
  margin-top:15px;
  border:1px solid #2aff00;
}

footer{text-align:center;padding:40px 0;opacity:0.6}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,0.3)}
</style>
</head>
<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="location.hash='write'">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>
<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
  apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain:"community-61897.firebaseapp.com",
  databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
  projectId:"community-61897",
  storageBucket:"community-61897.appspot.com",
  messagingSenderId:"1081865580697",
  appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const storage=getStorage(app);
const postsRef=ref(db,'posts');

let allPosts={};
let selectedPostKey=null;
let currentCategory='all';

window.addEventListener('hashchange',handleRouting);

function handleRouting(){
  const hash=location.hash.replace('#','');

  if(hash==="write"){
    renderWritePage();
    return;
  }

  selectedPostKey=hash.startsWith('post-')?hash.replace('post-',''):null;
  render();
}

window.filterCategory=category=>{
  currentCategory=category;
  renderList();
};

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  selectedPostKey?renderDetail(selectedPostKey):renderList();
}

/* ===================== */
/* ===== 글 작성 ===== */
/* ===================== */

function renderWritePage(){
  const container=document.getElementById('postList');
  container.innerHTML=`
  <div class="card">
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>
    <h2>게시글 작성</h2>

    <select id="w_category">
      <option value="공지">공지</option>
      <option value="잡담">잡담</option>
      <option value="정보">정보</option>
      <option value="질문">질문</option>
      <option value="거래">거래</option>
      <option value="도움">도움</option>
    </select>

    <input id="w_title" placeholder="제목">
    <input id="w_nick" placeholder="닉네임">
    <input id="w_pass" type="password" placeholder="비밀번호">
    <textarea id="w_content" rows="6" placeholder="내용"></textarea>

    <label>이미지 업로드</label>
    <input type="file" id="w_images" multiple accept="image/*">

    <label>파일 업로드</label>
    <input type="file" id="w_files" multiple>

    <button class="action-btn" onclick="submitPost()">게시하기</button>
  </div>`;
}

window.submitPost=async function(){
  const title=w_title.value;
  const nickname=w_nick.value;
  const password=w_pass.value;
  const content=w_content.value;
  const category=w_category.value;

  if(!title||!nickname||!password||!content){
    alert("모든 필드를 입력하세요");
    return;
  }

  const imageURLs=[];
  const fileData=[];

  for(let file of w_images.files){
    const storageRef=sRef(storage,'images/'+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    imageURLs.push(url);
  }

  for(let file of w_files.files){
    const storageRef=sRef(storage,'files/'+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    fileData.push({name:file.name,url});
  }

  const encoder=new TextEncoder();
  const hashBuffer=await crypto.subtle.digest('SHA-256',encoder.encode(password));
  const passwordHash=Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,'0')).join('');

  await push(postsRef,{
    title,nickname,content,category,
    password:passwordHash,
    images:imageURLs,
    files:fileData,
    comments:{}
  });

  location.hash='';
};

/* ===================== */
/* ===== 상세 확장 ===== */
/* ===================== */

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');
  if(!post){
    container.innerHTML="<div class='card'>존재하지 않는 게시글입니다.</div>";
    return;
  }

  let imageHTML='';
  if(post.images){
    post.images.forEach(url=>{
      imageHTML+=`<img src="${url}" class="uploaded-image">`;
    });
  }

  let fileHTML='';
  if(post.files){
    post.files.forEach(f=>{
      fileHTML+=`<div>📎 <a href="${f.url}" target="_blank">${f.name}</a></div>`;
    });
  }

  container.innerHTML+=`
  <div class='card'>
    ${imageHTML}
    ${fileHTML}
  </div>`;
}

</script>
</body>
</html>
