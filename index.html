<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}

/* ===== 헤더 ===== */
header{
  background:#111411;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #2aff00;
  position:sticky;
  top:0;
  z-index:100;
}
header h1{color:#9cff57}
.write-btn{
  background:#1a2a1a;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px 14px;
  cursor:pointer;
  font-size:14px;
}

/* ===== 카테고리 탭 ===== */
.category-bar{
  display:flex;
  gap:10px;
  padding:12px 40px;
  background:#0e110e;
  border-bottom:1px solid #2aff00;
  position:sticky;
  top:72px; /* 헤더 높이만큼 아래 고정 */
  z-index:90;
  overflow-x:auto;
}
.category-bar::-webkit-scrollbar{height:6px}
.category-bar::-webkit-scrollbar-thumb{background:#2aff00;border-radius:3px}
.category-btn{
  white-space:nowrap;
  padding:6px 16px;
  font-size:14px;
  border:1px solid rgba(0,255,0,0.4);
  color:#9cff57;
  background:transparent;
  cursor:pointer;
  transition:0.2s;
}
.category-btn.active{
  background:#2aff00;
  color:#000;
  border-color:#2aff00;
}

/* ===== 본문 ===== */
.container{
  max-width:1000px;
  margin:20px auto;
  padding:0 20px;
}
.card{
  background:#111611;
  padding:28px;
  margin-bottom:28px;
  border:1px solid rgba(0,255,0,0.2);
  cursor:pointer;
}

textarea,input,select{
  width:100%;
  margin-top:10px;
  background:#0f140f;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
}

.category-tag{
  font-size:12px;
  opacity:0.7;
  margin-bottom:10px;
}
.action-btn{
  margin-top:15px;
  background:#1a2a1a;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <h1>Nuclear Community</h1>
  <button class="write-btn" onclick="openForm()">게시하기</button>
</header>

<div class="category-bar" id="categoryBar"></div>
<div class="container" id="postList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:f9c3319e011cf7f297c808"
};

const MASTER_PASSWORD = "porygon2007";
const categories = ["전체","공지","잡담","정보","질문","거래","도움"];

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts = {};
let selectedPostKey = null;
let currentCategory = "전체";

window.addEventListener('hashchange',handleRouting);

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
}

function handleRouting(){
  const hash=location.hash.replace('#','');
  if(hash==='write') return renderWritePage();
  if(hash.startsWith('post-')) selectedPostKey=hash.replace('post-','');
  else selectedPostKey=null;
  render();
}

window.openForm=()=>location.hash='write';

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  renderCategoryBar();
  if(selectedPostKey) renderDetail(selectedPostKey);
  else renderList();
}

function renderCategoryBar(){
  const bar=document.getElementById('categoryBar');
  bar.innerHTML='';
  categories.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='category-btn'+(currentCategory===cat?' active':'');
    btn.innerText=cat;
    btn.onclick=()=>{
      currentCategory=cat;
      selectedPostKey=null;
      location.hash='';
      render();
    };
    bar.appendChild(btn);
  });
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';
  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory!=="전체" && post.category!==currentCategory) return;

    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div class="category-tag">[${post.category}]</div>
      <h3>${post.title}</h3>
      <div>${post.nickname}</div>
    `;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  container.innerHTML=`
  <div class='card' style="cursor:default">
    <button onclick="location.hash=''">← 돌아가기</button>
    <button onclick="deletePost('${key}')">삭제</button>
    <div class="category-tag">[${post.category}]</div>
    <h2>${post.title}</h2>
    <div style="margin-top:20px;">${post.content}</div>
  </div>`;
}

function renderWritePage(){
  const container=document.getElementById('postList');
  container.innerHTML=`
  <div class='card' style="cursor:default">
    <button onclick="location.hash=''">← 돌아가기</button>
    <h2>게시글 작성</h2>

    <select id="category">
      <option value="공지">공지</option>
      <option value="잡담">잡담</option>
      <option value="정보">정보</option>
      <option value="질문">질문</option>
      <option value="거래">거래</option>
      <option value="도움">도움</option>
    </select>

    <input id='title' placeholder='제목'>
    <input id='nickname' placeholder='닉네임'>
    <input id='password' type='password' placeholder='삭제용 비밀번호'>
    <textarea id='content' rows='6' placeholder='내용'></textarea>
    <button class="action-btn" onclick='submitPost()'>등록</button>
  </div>`;
}

window.submitPost=async function(){
  const title=document.getElementById('title').value.trim();
  const nickname=document.getElementById('nickname').value.trim();
  const content=document.getElementById('content').value.trim();
  const password=document.getElementById('password').value;
  const category=document.getElementById('category').value;

  if(!title||!nickname||!content||!password){
    alert('모든 항목 입력');
    return;
  }

  await push(postsRef,{
    title,
    nickname,
    content,
    category,
    password: await hashPassword(password),
    date:new Date().toLocaleDateString()
  });

  location.hash='';
}

window.deletePost=async function(key){
  const input=prompt("비밀번호 입력");
  if(!input) return;

  const post=allPosts[key];

  if(input===MASTER_PASSWORD){
    await remove(ref(db,'posts/'+key));
    location.hash='';
    return;
  }

  const hashed=await hashPassword(input);
  if(hashed!==post.password){
    alert("비밀번호 틀림");
    return;
  }

  await remove(ref(db,'posts/'+key));
  location.hash='';
}
</script>

</body>
</html>
