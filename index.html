<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}

textarea,input{
  width:100%;
  margin-top:10px;
  background:#0f140f;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
}

.action-btn{
  background:#132013;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:6px 12px;
  margin:6px 4px 6px 0;
  cursor:pointer;
}

.reply-box{
  margin-left:25px;
  margin-top:10px;
  padding:10px;
  background:#0f180f;
  border:1px solid rgba(0,255,0,0.2);
  display:none;
}

footer{text-align:center;padding:40px 0;opacity:0.6}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,0.3)}
</style>
</head>
<body>

<header>
<h1 style="padding:20px">Nuclear Community</h1>
</header>

<div class="container" id="postList"></div>
<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG",
  appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts={};
let selectedPostKey=null;

window.addEventListener('hashchange',handleRouting);

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPermission(inputPassword, savedHash){
  if(inputPassword===MASTER_PASSWORD) return true;
  return (await hashPassword(inputPassword))===savedHash;
}

function handleRouting(){
  const hash=location.hash.replace('#','');
  if(hash.startsWith('post-')){
    selectedPostKey=hash.replace('post-','');
  }else{
    selectedPostKey=null;
  }
  render();
}

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  if(selectedPostKey) renderDetail(selectedPostKey);
  else renderList();
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';
  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${post.title}</h3><div class='meta'>${post.nickname}</div>`;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  let commentsHTML='';
  if(post.comments){
    Object.entries(post.comments).forEach(([cid,c])=>{
      commentsHTML+=`
      <div style="margin-top:20px;border-top:1px solid #1f3f1f;padding-top:10px;">
        <b>${c.nickname}</b>
        <div>${c.text}</div>
        <button class="action-btn" onclick="deleteComment('${key}','${cid}')">삭제</button>
        <button class="action-btn" onclick="toggleReplyBox('${cid}')" id="btn_${cid}">답글</button>
      `;

      if(c.replies){
        Object.entries(c.replies).forEach(([rid,r])=>{
          commentsHTML+=`
          <div class="reply-box" style="display:block;">
            <b>${r.nickname}</b>
            <div>${r.text}</div>
            <button class="action-btn" onclick="deleteReply('${key}','${cid}','${rid}')">삭제</button>
          </div>`;
        });
      }

      commentsHTML+=`
        <div id="reply_${cid}" class="reply-box">
          <input id="r_nick_${cid}" placeholder="닉네임">
          <input id="r_pass_${cid}" type="password" placeholder="비밀번호">
          <input id="r_text_${cid}" placeholder="답글">
          <button class="action-btn" onclick="addReply('${key}','${cid}')">등록</button>
        </div>
      </div>`;
    });
  }

  container.innerHTML=`
  <div class='card'>
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>
    <h2>${post.title}</h2>
    <div>${post.content}</div>
    <button class="action-btn" onclick="deletePost('${key}')">글 삭제</button>
    <hr>
    <h3>댓글</h3>
    ${commentsHTML}
  </div>`;
}

window.deletePost=async function(key){
  const input=prompt("비밀번호 입력");
  if(!input) return;
  if(await checkPermission(input,allPosts[key].password)){
    remove(ref(db,'posts/'+key));
  }else alert("권한 없음");
};

window.deleteComment=async function(postKey,cid){
  const input=prompt("비밀번호 입력");
  if(!input) return;
  if(await checkPermission(input,allPosts[postKey].comments[cid].password)){
    remove(ref(db,'posts/'+postKey+'/comments/'+cid));
  }else alert("권한 없음");
};

window.deleteReply=async function(postKey,cid,rid){
  const input=prompt("비밀번호 입력");
  if(!input) return;
  if(await checkPermission(input,allPosts[postKey].comments[cid].replies[rid].password)){
    remove(ref(db,'posts/'+postKey+'/comments/'+cid+'/replies/'+rid));
  }else alert("권한 없음");
};

window.toggleReplyBox=function(cid){
  document.querySelectorAll('.reply-box').forEach(b=>{
    if(b.id.startsWith('reply_')) b.style.display='none';
  });
  document.querySelectorAll('[id^="btn_"]').forEach(b=>b.innerText='답글');

  const box=document.getElementById('reply_'+cid);
  const btn=document.getElementById('btn_'+cid);

  if(box.style.display==='block'){
    box.style.display='none';
    btn.innerText='답글';
  }else{
    box.style.display='block';
    btn.innerText='취소';
  }
};
</script>
</body>
</html>
