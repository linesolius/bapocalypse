<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin-right:6px;cursor:pointer}
nav button:hover{box-shadow:0 0 8px #2aff00}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2);cursor:pointer;transition:.2s}
.card:hover{box-shadow:0 0 10px #2aff00;transform:translateY(-2px)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px}
.action-btn{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin:6px 4px 6px 0;cursor:pointer}
.comment{margin-top:15px;padding:10px;background:#0f180f;border:1px solid rgba(0,255,0,.2)}
.reply{margin-left:25px;margin-top:10px;padding:10px;background:#0c140c;border:1px solid rgba(0,255,0,.2)}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,.3)}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#111;
padding:25px;
border:1px solid #2aff00;
width:300px;
}

</style>
</head>

<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
</div>
</header>

<div class="container" id="postList"></div>

<div id="passwordModal" class="modal">
<div class="modal-box">

<h3>비밀번호 입력</h3>

<input type="password" id="modalPass">

<br><br>

<button class="action-btn" onclick="confirmDelete()">확인</button>
<button class="action-btn" onclick="closeModal()">취소</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const postsRef=ref(db,'posts');

let allPosts={};
let deleteTarget=null;

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{};
renderList();
});

function renderList(){

const container=document.getElementById("postList");
container.innerHTML="";

Object.entries(allPosts).forEach(([key,post])=>{

const card=document.createElement("div");
card.className="card";

card.onclick=()=>location.hash="post-"+key;

card.innerHTML=`
<div class="meta">${post.nickname||"익명"}</div>
<h3>${escapeHTML(post.title)}</h3>
<div>${escapeHTML(post.content).slice(0,120)}</div>
`;

container.appendChild(card);

});

}

window.onhashchange=()=>{

const hash=location.hash.replace("#","");

if(hash.startsWith("post-")){

renderDetail(hash.replace("post-",""));

}

}

function renderDetail(key){

const post=allPosts[key];
const container=document.getElementById("postList");

let commentHTML="";

if(post.comments){

Object.entries(post.comments).forEach(([cid,c])=>{

commentHTML+=`
<div class="comment">

<b>${escapeHTML(c.nickname)}</b>
<div>${escapeHTML(c.content)}</div>

<button class="action-btn" onclick="toggleReply('${cid}')">답글</button>
<button class="action-btn" onclick="openDelete('comment','${key}','${cid}')">삭제</button>

<div id="replyBox-${cid}" style="display:none">

<input id="r_nick-${cid}" placeholder="닉네임">
<input id="r_pass-${cid}" type="password" placeholder="비밀번호">
<textarea id="r_content-${cid}" placeholder="답글"></textarea>

<button class="action-btn" onclick="submitReply('${key}','${cid}')">답글 작성</button>

</div>
`;

if(c.replies){

Object.entries(c.replies).forEach(([rid,r])=>{

commentHTML+=`
<div class="reply">

<b>${escapeHTML(r.nickname)}</b>
<div>${escapeHTML(r.content)}</div>

<button class="action-btn" onclick="openDelete('reply','${key}','${cid}','${rid}')">삭제</button>

</div>
`;

});

}

commentHTML+="</div>";

});

}

container.innerHTML=`

<div class="card" style="cursor:default">

<button class="action-btn" onclick="location.hash=''">목록</button>

<h2>${escapeHTML(post.title)}</h2>

<p>${escapeHTML(post.content)}</p>

<hr>

<h3>댓글</h3>

${commentHTML}

<hr>

<input id="c_nick" placeholder="닉네임">
<input id="c_pass" type="password" placeholder="비밀번호">
<textarea id="c_content" placeholder="댓글"></textarea>

<button class="action-btn" onclick="submitComment('${key}')">댓글 작성</button>

</div>

`;

}

window.submitComment=function(postKey){

const nick=c_nick.value;
const pass=c_pass.value;
const content=c_content.value;

if(!nick||!pass||!content){
alert("댓글 입력");
return;
}

push(ref(db,"posts/"+postKey+"/comments"),{
nickname:nick,
password:pass,
content:content,
date:Date.now()
});

c_content.value="";

}

window.toggleReply=function(cid){

const box=document.getElementById("replyBox-"+cid);

box.style.display=box.style.display==="none"?"block":"none";

}

window.submitReply=function(postKey,cid){

const nick=document.getElementById("r_nick-"+cid).value;
const pass=document.getElementById("r_pass-"+cid).value;
const content=document.getElementById("r_content-"+cid).value;

if(!nick||!pass||!content){
alert("답글 입력");
return;
}

push(ref(db,"posts/"+postKey+"/comments/"+cid+"/replies"),{
nickname:nick,
password:pass,
content:content,
date:Date.now()
});

}

window.openDelete=function(type,post,cid,rid){

deleteTarget={type,post,cid,rid};

document.getElementById("passwordModal").style.display="flex";

}

window.closeModal=function(){

document.getElementById("passwordModal").style.display="none";
modalPass.value="";

}

window.confirmDelete=function(){

const pass=modalPass.value;

if(deleteTarget.type==="comment"){

const c=allPosts[deleteTarget.post].comments[deleteTarget.cid];

if(pass!==c.password && pass!==MASTER_PASSWORD){
alert("비밀번호 틀림");
return;
}

remove(ref(db,"posts/"+deleteTarget.post+"/comments/"+deleteTarget.cid));

}

if(deleteTarget.type==="reply"){

const r=allPosts[deleteTarget.post].comments[deleteTarget.cid].replies[deleteTarget.rid];

if(pass!==r.password && pass!==MASTER_PASSWORD){
alert("비밀번호 틀림");
return;
}

remove(ref(db,"posts/"+deleteTarget.post+"/comments/"+deleteTarget.cid+"/replies/"+deleteTarget.rid));

}

closeModal();

}

function escapeHTML(str){
if(!str) return "";
return str
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}

</script>

</body>
</html>
