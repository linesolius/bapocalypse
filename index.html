<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Community</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tab{
padding:8px 15px;
background:#ddd;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#333;
color:white;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.title{
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.meta{
font-size:12px;
color:gray;
margin-top:5px;
}

button{
padding:6px 10px;
margin-top:8px;
cursor:pointer;
}

.comment{
margin-top:10px;
padding:10px;
background:#fafafa;
border-radius:6px;
}

.reply{
margin-left:20px;
margin-top:5px;
background:#f0f0f0;
padding:8px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>커뮤니티</h1>

<div class="tabs" id="tabs"></div>

<div class="card">

<h3>게시글 작성</h3>

<select id="category">
<option>공지</option>
<option>잡담</option>
<option>정보</option>
<option>질문</option>
<option>거래</option>
<option>도움</option>
</select>

<input id="title" placeholder="제목" style="width:100%;margin-top:5px">

<textarea id="content" placeholder="내용" style="width:100%;height:100px;margin-top:5px"></textarea>

<input id="password" placeholder="삭제 비밀번호">

<button onclick="writePost()">작성</button>

</div>

<div id="postList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.firebasestorage.app",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:f9c3319e011cf7f297c808"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const MASTER="porygon2007"
const ADMIN="torso1989"

let posts={}
let currentCategory="전체"

const categories=["전체","공지","잡담","정보","질문","거래","도움"]

const tabs=document.getElementById("tabs")

categories.forEach(c=>{
const div=document.createElement("div")
div.className="tab"
div.innerText=c
div.onclick=()=>{
currentCategory=c
renderPosts()
}
tabs.appendChild(div)
})

window.writePost=function(){

const category=document.getElementById("category").value
const title=document.getElementById("title").value
const content=document.getElementById("content").value
const password=document.getElementById("password").value

if(!title||!content)return alert("내용 입력")

const newRef=push(ref(db,"posts"))

set(newRef,{
category,
title,
content,
password,
pinned:false,
time:Date.now()
})

}

onValue(ref(db,"posts"),snap=>{

posts=snap.val()||{}
renderPosts()

})

function renderPosts(){

const list=document.getElementById("postList")
list.innerHTML=""

let arr=Object.entries(posts)

arr.sort((a,b)=>{
if(a[1].pinned&&!b[1].pinned)return -1
if(!a[1].pinned&&b[1].pinned)return 1
return b[1].time-a[1].time
})

arr.forEach(([key,p])=>{

if(currentCategory!="전체" && p.category!=currentCategory) return

const div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="title" onclick="openPost('${key}')">
${p.pinned?"📌 ":""}[${p.category}] ${p.title}
</div>

<div class="meta">${new Date(p.time).toLocaleString()}</div>

`

list.appendChild(div)

})

}

window.openPost=function(key){

const p=posts[key]

const list=document.getElementById("postList")

list.innerHTML=`

<div class="card">

<h2>${p.title}</h2>

<div style="margin:10px 0">${p.content}</div>

<button onclick="deletePost('${key}')">삭제</button>
<button onclick="editPost('${key}')">수정</button>
<button onclick="pinPost('${key}')">상단고정</button>

<h3>댓글</h3>

<input id="commentText">
<button onclick="writeComment('${key}')">댓글 작성</button>

<div id="comments"></div>

</div>

`

renderComments(key)

}

window.deletePost=function(key){

const pw=prompt("비밀번호")

if(pw===MASTER || pw===posts[key].password){

remove(ref(db,"posts/"+key))

}else{
alert("비밀번호 틀림")
}

}

window.editPost=function(key){

const pw=prompt("비밀번호")

if(pw!==MASTER && pw!==posts[key].password) return alert("비밀번호 틀림")

const title=prompt("제목",posts[key].title)
const content=prompt("내용",posts[key].content)

update(ref(db,"posts/"+key),{
title,content
})

}

window.pinPost=function(key){

const code=prompt("관리자 코드")

if(code!==ADMIN) return alert("관리자 전용")

update(ref(db,"posts/"+key),{
pinned:!posts[key].pinned
})

}

window.writeComment=function(key){

const text=document.getElementById("commentText").value

const newRef=push(ref(db,"comments/"+key))

set(newRef,{
text,
time:Date.now()
})

}

function renderComments(postKey){

const div=document.getElementById("comments")

onValue(ref(db,"comments/"+postKey),snap=>{

const data=snap.val()||{}

div.innerHTML=""

Object.entries(data).forEach(([cid,c])=>{

const cdiv=document.createElement("div")
cdiv.className="comment"

cdiv.innerHTML=`

${c.text}

<button onclick="deleteComment('${postKey}','${cid}')">삭제</button>

<input id="reply_${cid}">
<button onclick="writeReply('${postKey}','${cid}')">답글</button>

<div id="replyBox_${cid}"></div>

`

div.appendChild(cdiv)

renderReplies(postKey,cid)

})

})

}

window.deleteComment=function(postKey,cid){

remove(ref(db,"comments/"+postKey+"/"+cid))

}

window.writeReply=function(postKey,cid){

const text=document.getElementById("reply_"+cid).value

const newRef=push(ref(db,"replies/"+cid))

set(newRef,{
text,
time:Date.now()
})

}

function renderReplies(postKey,cid){

const box=document.getElementById("replyBox_"+cid)

onValue(ref(db,"replies/"+cid),snap=>{

const data=snap.val()||{}

box.innerHTML=""

Object.entries(data).forEach(([rid,r])=>{

const div=document.createElement("div")
div.className="reply"

div.innerHTML=`
↳ ${r.text}
<button onclick="deleteReply('${cid}','${rid}')">삭제</button>
`

box.appendChild(div)

})

})

}

window.deleteReply=function(cid,rid){

remove(ref(db,"replies/"+cid+"/"+rid))

}

</script>

</body>
</html>
