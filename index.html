<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6ff7e5b838cdbde397c808",
  measurementId: "G-XSNWJ8PT5X"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts = {};
let selectedPostKey = null;
let currentCategory = 'all';

window.addEventListener('hashchange', handleRouting);

window.filterCategory = function(category){
  currentCategory = category;
  renderList();
}

window.openForm = () => location.hash = 'write';

async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function handleRouting(){
  const hash = location.hash.replace('#','');

  if(hash === 'write'){
    selectedPostKey = null;
    renderWritePage();
    return;
  }

  if(hash.startsWith('post-')){
    selectedPostKey = hash.slice(5); 
    renderDetail(selectedPostKey);
    return;
  }

  selectedPostKey = null;
  renderList();
}

onValue(postsRef,(snap)=>{
  allPosts = snap.val() || {};
  renderList();
});

function renderList(){
  const container = document.getElementById('postList');
  container.innerHTML = '';

  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory !== 'all' && post.category !== currentCategory) return;

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class='meta'>[${post.category || '미분류'}]</div>
      <h3>${post.title}</h3>
      <div class='meta'>${post.nickname}</div>
    `;
    
    div.addEventListener('click', () => {
      location.hash = 'post-'+key;
    });

    container.appendChild(div);
  });

  if(!container.innerHTML){
    container.innerHTML="<div style='text-align:center;margin-top:120px;'>게시글이 없습니다.</div>";
  }
}

function renderDetail(key){
  const post = allPosts[key];
  const container = document.getElementById('postList');

  if(!post){
    container.innerHTML = "<div class='card'>존재하지 않는 게시글입니다.</div>";
    return;
  }

  let commentsHTML = '';

  if(post.comments){
    Object.entries(post.comments).forEach(([cid, c])=>{

      commentsHTML += `
        <div style="margin-top:20px;padding:10px;border-top:1px solid #ddd;">
          <b>${c.nickname}</b>
          <div style="margin:5px 0;">${c.text}</div>
          <button class="action-btn" onclick="deleteComment('${key}','${cid}')">삭제</button>
      `;

      if(c.replies){
        Object.entries(c.replies).forEach(([rid, r])=>{
          commentsHTML += `
            <div style="margin-left:20px;margin-top:10px;padding:8px;background:#f5f5f5;border-radius:6px;">
              <b>${r.nickname}</b>
              <div>${r.text}</div>
              <button class="action-btn" onclick="deleteReply('${key}','${cid}','${rid}')">삭제</button>
            </div>
          `;
        });
      }

      commentsHTML += `
          <div style="margin-top:10px;">
            <input id="r_nick_${cid}" placeholder="닉네임">
            <input id="r_pass_${cid}" type="password" placeholder="비밀번호">
            <input id="r_text_${cid}" placeholder="답글">
            <button class="action-btn" onclick="addReply('${key}','${cid}')">답글</button>
          </div>
        </div>
      `;
    });
  }

  container.innerHTML = `
  <div class='card'>
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>

    <div class='meta'>[${post.category||'미분류'}]</div>
    <h2>${post.title}</h2>
    <div class='meta'>작성자: ${post.nickname}</div>

    <div style="margin-top:20px; white-space:pre-line;">
      ${post.content}
    </div>

    <div style="margin-top:20px;">
      <button class="action-btn" onclick="showPostEdit('${key}')">수정</button>
      <button class="action-btn" onclick="showPostDelete('${key}')">삭제</button>
    </div>

    <hr style="margin:30px 0;">
    <h3>댓글</h3>

    ${commentsHTML}

    <div style="margin-top:20px;">
      <input id="c_nick" placeholder="닉네임">
      <input id="c_pass" type="password" placeholder="비밀번호">
      <textarea id="c_text" rows="3" placeholder="댓글"></textarea>
      <button class="action-btn" onclick="addComment('${key}')">댓글 등록</button>
    </div>
  </div>`;
}

// 댓글 추가
window.addComment = async function(postKey){
  const nick = document.getElementById('c_nick').value.trim();
  const pass = document.getElementById('c_pass').value;
  const text = document.getElementById('c_text').value.trim();
  if(!nick || !pass || !text) return alert("모든 항목 입력");

  const newRef = push(ref(db, 'posts/'+postKey+'/comments'));
  await update(newRef,{
    nickname: nick,
    password: await hashPassword(pass),
    text: text,
    replies: {}
  });
};

// 댓글 삭제
window.deleteComment = async function(postKey, commentKey){
  const input = prompt("비밀번호 입력");
  if(!input) return;

  const saved = allPosts[postKey].comments[commentKey].password;
  if(await hashPassword(input) !== saved) return alert("비밀번호 불일치");

  remove(ref(db,'posts/'+postKey+'/comments/'+commentKey));
};

// 대댓글 작성
window.addReply = async function(postKey, commentKey){
  const nick = document.getElementById('r_nick_'+commentKey).value.trim();
  const pass = document.getElementById('r_pass_'+commentKey).value;
  const text = document.getElementById('r_text_'+commentKey).value.trim();
  if(!nick || !pass || !text) return alert("입력");

  const newRef = push(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies'));
  await update(newRef,{
    nickname: nick,
    password: await hashPassword(pass),
    text: text
  });
};

// 대댓글 삭제
window.deleteReply = async function(postKey, commentKey, replyKey){
  const input = prompt("비밀번호 입력");
  if(!input) return;

  const saved = allPosts[postKey].comments[commentKey].replies[replyKey].password;
  if(await hashPassword(input) !== saved) return alert("비밀번호 불일치");

  remove(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies/'+replyKey));
};

</script>

</body>
</html>
