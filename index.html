<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}

.topbar{
display:flex;
justify-content:space-between;
align-items:center
}

nav{margin-top:10px}

nav button{
background:#132013;
border:1px solid #2aff00;
color:#9cff57;
padding:6px 12px;
margin-right:6px;
cursor:pointer
}

.write-btn{
background:#1a2a1a;
border:1px solid #2aff00;
color:#9cff57;
padding:8px 14px;
cursor:pointer
}

.container{
max-width:1000px;
margin:40px auto;
padding:0 20px
}

.card{
background:#111611;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(0,255,0,0.2);
cursor:pointer
}

.meta{
font-size:12px;
color:#5eff2a;
margin-bottom:10px
}

textarea,input,select{
width:100%;
margin-top:10px;
background:#0f140f;
border:1px solid #2aff00;
color:#9cff57;
padding:8px
}

.action-btn{
background:#132013;
border:1px solid #2aff00;
color:#9cff57;
padding:6px 12px;
margin:6px 4px 6px 0;
cursor:pointer
}

.comment{
margin-top:15px;
padding:10px;
background:#0f180f;
border:1px solid rgba(0,255,0,.2)
}

.reply{
margin-left:25px;
margin-top:10px;
padding:10px;
background:#0c140c;
border:1px solid rgba(0,255,0,.2)
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#111611;
padding:25px;
border:1px solid #2aff00;
width:300px;
}

.time{
font-size:11px;
color:#6cff3c;
margin-top:5px;
}
</style>
</head>

<body>

<header>

<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="renderWrite()">글쓰기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>

</header>

<div class="container" id="postList"></div>

<div id="passwordModal" class="modal">
<div class="modal-box">

<h3>비밀번호 입력</h3>
<input type="password" id="modalPassword">

<br><br>

<button class="action-btn" onclick="confirmPassword()">확인</button>
<button class="action-btn" onclick="closePasswordModal()">취소</button>

</div>
</div>

<footer>© 2033 Nuclear Community</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const postsRef=ref(db,'posts');

let allPosts={};
let currentCategory='all';
let deleteTarget=null;

window.filterCategory=function(category){
currentCategory=category;
renderList();
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{};
renderList();
});

function renderList(){

const container=document.getElementById('postList');
container.innerHTML='';

const postsArray=Object.entries(allPosts);

postsArray.sort((a,b)=> (b[1].date||0)-(a[1].date||0));

postsArray.forEach(([key,post])=>{

if(currentCategory!=='all' && post.category!==currentCategory) return;

const card=document.createElement('div');
card.className='card';
card.onclick=()=>renderDetail(key);

card.innerHTML=`
<div class='meta'>[${post.category}] ${escapeHTML(post.nickname)}</div>
<h3>${escapeHTML(post.title)}</h3>
<div>${escapeHTML(post.content).slice(0,120)}...</div>
<div class="time">${formatTime(post.date)}</div>
`;

container.appendChild(card);

});

}

window.renderWrite=function(){

const container=document.getElementById('postList');

container.innerHTML=`

<div class="card" style="cursor:default">

<h2>글 작성</h2>

<select id="w_category">
<option>공지</option>
<option>잡담</option>
<option>정보</option>
<option>질문</option>
<option>거래</option>
<option>도움</option>
</select>

<input id="w_nick" placeholder="닉네임">
<input id="w_pass" type="password" placeholder="비밀번호">
<input id="w_title" placeholder="제목">

<textarea id="w_content" placeholder="내용"></textarea>

<button class="action-btn" onclick="submitPost()">게시하기</button>
<button class="action-btn" onclick="renderList()">취소</button>

</div>

`;

}

window.submitPost=function(){

push(postsRef,{
category:w_category.value,
nickname:w_nick.value,
password:w_pass.value,
title:w_title.value,
content:w_content.value,
date:Date.now()
});

renderList();

}

function renderDetail(key){

const post=allPosts[key];
const container=document.getElementById('postList');

container.innerHTML=`

<div class='card' style="cursor:default">

<button class='action-btn' onclick="renderList()">목록</button>

<h2>${escapeHTML(post.title)}</h2>
<p>${escapeHTML(post.content)}</p>

<div class="time">${formatTime(post.date)}</div>

<hr>

<h3>댓글</h3>

<input id='c_nick' placeholder='닉네임'>
<input id='c_pass' type='password' placeholder='비밀번호'>
<textarea id='c_content' placeholder='댓글'></textarea>

<button class='action-btn' onclick="submitComment('${key}')">댓글 작성</button>

</div>

`;

}

window.submitComment=function(postKey){

push(ref(db,'posts/'+postKey+'/comments'),{
nickname:c_nick.value,
password:c_pass.value,
content:c_content.value,
date:Date.now()
});

}

function formatTime(timestamp){
const d=new Date(timestamp);
return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
}

function escapeHTML(str){
if(!str) return "";
return str
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;');
}

</script>
</body>
</html>
