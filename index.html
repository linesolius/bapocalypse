<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Realtime Community</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#f4f6f9}
header{background:#4a6cf7;color:white;padding:1rem;text-align:center}
.container{max-width:1000px;margin:2rem auto;padding:1rem}
.post-form{background:white;padding:1rem;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:2rem}
input,textarea,select{width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid #ccc;border-radius:4px}
button{background:#4a6cf7;color:white;border:none;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer}
.delete-btn{background:#e53935}
table{width:100%;border-collapse:collapse;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
th,td{padding:0.8rem;text-align:center;border-bottom:1px solid #eee}
th{background:#f1f3f5}
tr:hover{background:#fafafa;cursor:pointer}
.notice-row{background:#fff3e0;font-weight:bold}
.detail-box{background:white;padding:1rem;margin-top:1rem;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.comment{border-top:1px solid #eee;padding:0.5rem 0}
</style>
</head>
<body>
<header>
<h1>📋 게시판 형식 커뮤니티</h1>
</header>
<div class="container">
<div class="post-form">
<h2>글 작성</h2>
<select id="category">
<option value="공지">공지</option>
<option value="잡담">잡담</option>
<option value="정보">정보</option>
<option value="질문">질문</option>
<option value="거래">거래</option>
<option value="도움">도움</option>
</select>
<input id="nickname" placeholder="닉네임" required>
<input id="password" type="password" placeholder="삭제용 비밀번호" required>
<input id="title" placeholder="제목" required>
<textarea id="content" rows="4" placeholder="내용" required></textarea>
<button onclick="addPost()">게시하기</button>
</div>

<table>
<thead>
<tr>
<th>번호</th>
<th>카테고리</th>
<th>제목</th>
<th>작성자</th>
<th>날짜</th>
</tr>
</thead>
<tbody id="boardBody"></tbody>
</table>

<div id="detail"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "여기에_입력",
authDomain: "여기에_입력",
databaseURL: "여기에_입력",
projectId: "여기에_입력",
storageBucket: "여기에_입력",
messagingSenderId: "여기에_입력",
appId: "여기에_입력"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db, "posts");

async function sha256(text){
const encoder=new TextEncoder();
const data=encoder.encode(text);
const hash=await crypto.subtle.digest("SHA-256",data);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

window.addPost=async function(){
const nickname=document.getElementById('nickname').value;
const password=document.getElementById('password').value;
const category=document.getElementById('category').value;
const title=document.getElementById('title').value;
const content=document.getElementById('content').value;
if(!nickname||!password||!title||!content) return alert("모든 항목 입력");
const hashed=await sha256(password);
push(postsRef,{nickname,password:hashed,category,title,content,date:new Date().toLocaleString()});
document.getElementById('title').value="";
document.getElementById('content').value="";
document.getElementById('password').value="";
}

window.viewPost=async function(postId){
const snapshot=await get(ref(db,`posts/${postId}`));
const post=snapshot.val();
const detail=document.getElementById('detail');
detail.innerHTML=`
<div class="detail-box">
<h3>${post.title}</h3>
<p><strong>${post.nickname}</strong> | ${post.date}</p>
<p>${post.content}</p>
<button class="delete-btn" onclick="deletePost('${postId}')">삭제</button>
</div>`;
}

window.deletePost=async function(postId){
const input=prompt("비밀번호 입력");
if(!input)return;
const hashed=await sha256(input);
const snapshot=await get(ref(db,`posts/${postId}`));
if(snapshot.val().password===hashed){
remove(ref(db,`posts/${postId}`));
document.getElementById('detail').innerHTML="";
alert("삭제 완료");
}else alert("비밀번호 틀림");
}

onValue(postsRef,(snapshot)=>{
const boardBody=document.getElementById('boardBody');
boardBody.innerHTML="";
const data=snapshot.val();
if(!data)return;

let entries=Object.entries(data);
entries.sort((a,b)=>{
if(a[1].category==="공지"&&b[1].category!=="공지")return -1;
if(a[1].category!=="공지"&&b[1].category==="공지")return 1;
return 0;
});
entries.reverse();

entries.forEach(([postId,post],index)=>{
const tr=document.createElement('tr');
if(post.category==="공지") tr.classList.add('notice-row');
tr.innerHTML=`
<td>${index+1}</td>
<td>${post.category}</td>
<td>${post.title}</td>
<td>${post.nickname}</td>
<td>${post.date}</td>`;
tr.onclick=()=>viewPost(postId);
boardBody.appendChild(tr);
});
});
</script>
</body>
</html>
