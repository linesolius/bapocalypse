<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const ADMIN_CODE="torso1989"
const MASTER_DELETE_CODE="porygon2007"

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const postsRef=ref(db,'posts')

let allPosts={}
let currentPostKey=null


function openPasswordModal(callback){
const modal=document.getElementById("passwordModal")
modal.style.display="flex"

document.getElementById("pwConfirm").onclick=function(){
const pw=document.getElementById("pwInput").value
modal.style.display="none"
document.getElementById("pwInput").value=""
callback(pw)
}
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{}
if(currentPostKey){
renderDetail(currentPostKey)
}else{
renderList()
}
})

/* =========================
게시글 삭제 (수정됨)
========================= */

window.deletePost=function(key){

openPasswordModal(async function(input){

const snapshot=await get(ref(db,'posts/'+key))
const post=snapshot.val()

if(input===post.password || input===MASTER_DELETE_CODE){
remove(ref(db,'posts/'+key))
}else{
alert("비밀번호 틀림")
}

})

}
