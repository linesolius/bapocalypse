<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2aff00}
header h1{letter-spacing:2px;text-shadow:0 0 8px rgba(0,255,0,0.8)}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}

.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:30px;margin-bottom:30px;border:1px solid rgba(0,255,0,0.2)}

textarea,input{
  width:100%;
  margin-top:10px;
  background:#0f140f;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
  outline:none
}

button{cursor:pointer}

.comment{margin-top:25px;padding:15px;border:1px solid rgba(0,255,0,0.2)}

footer{text-align:center;padding:40px 0;opacity:0.6}

.card h2{margin-bottom:25px;}
.card > div{margin-bottom:25px;}
.card hr{margin:35px 0;}

.top-actions{display:flex;gap:10px;margin-bottom:20px;}
.action-btn{
  background:transparent;
  border:1px solid rgba(0,255,0,0.4);
  color:#9cff57;
  padding:6px 12px;
  font-size:13px;
  transition:all 0.2s ease;
}
.action-btn:hover{
  background:#1a2a1a;
  border-color:#2aff00;
  box-shadow:0 0 8px rgba(0,255,0,0.6);
}
</style>
</head>
<body>

<header>
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="openForm()">게시하기</button>
</header>

<div class="container" id="postList"></div>
<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6890110c8db86e0f97c808"
};

const MASTER_PASSWORD = "porygon2007";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts = {};
let selectedPostKey = null;

window.addEventListener('hashchange',handleRouting);

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

function handleRouting(){
  const hash=location.hash.replace('#','');
  if(hash==='write') return renderWritePage();
  if(hash.startsWith('edit-')) return renderEditPage(hash.replace('edit-',''));
  if(hash.startsWith('post-')) selectedPostKey=hash.replace('post-','');
  else selectedPostKey=null;
  render();
}

window.openForm=()=>location.hash='write';

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  if(selectedPostKey) renderDetail(selectedPostKey);
  else renderList();
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';
  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=\`<h3>\${post.title}</h3><div>\${post.nickname}</div>\`;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  let commentsHTML='';
  if(post.comments){
    Object.entries(post.comments).forEach(([cid,c])=>{
      commentsHTML+=\`
      <div class='comment'>
        <b>\${c.nickname}</b>
        <button onclick="deleteComment('\${key}','\${cid}')">삭제</button>
        <div>\${c.text}</div>
      </div>\`;
    });
  }

  container.innerHTML=\`
  <div class='card'>
    <div class="top-actions">
      <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>
      <button class="action-btn" onclick="location.hash='edit-\${key}'">수정</button>
      <button class="action-btn" onclick="deletePost('\${key}')">삭제</button>
    </div>
    <h2>\${post.title}</h2>
    <div>\${post.content}</div>
    <hr>
    <h3>댓글</h3>
    \${commentsHTML}
    <input id='c_nick' placeholder='닉네임'>
    <input id='c_pass' type='password' placeholder='비밀번호'>
    <textarea id='c_text' rows='3' placeholder='댓글'></textarea>
    <button class="action-btn" onclick="addComment('\${key}')">댓글 등록</button>
  </div>\`;
}

function renderEditPage(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  container.innerHTML=\`
  <div class='card'>
    <div class="top-actions">
      <button class="action-btn" onclick="location.hash='post-\${key}'">← 취소</button>
    </div>
    <h2>게시글 수정</h2>
    <input id='edit_title' value="\${post.title}">
    <textarea id='edit_content' rows='6'>\${post.content}</textarea>
    <input id='edit_pass' type='password' placeholder='비밀번호 입력'>
    <button class="action-btn" onclick="updatePost('\${key}')">수정 완료</button>
  </div>\`;
}

window.updatePost=async function(key){
  const title=document.getElementById('edit_title').value.trim();
  const content=document.getElementById('edit_content').value.trim();
  const pass=document.getElementById('edit_pass').value;
  const post=allPosts[key];

  if(pass===MASTER_PASSWORD){
    await update(ref(db,'posts/'+key),{title,content});
    location.hash='post-'+key;
    return;
  }

  const hashed=await hashPassword(pass);
  if(hashed!==post.password) return alert("비밀번호 틀림");

  await update(ref(db,'posts/'+key),{title,content});
  location.hash='post-'+key;
}

window.deletePost=async function(key){
  const pass=prompt("비밀번호 입력");
  if(!pass) return;
  const post=allPosts[key];

  if(pass===MASTER_PASSWORD){
    await remove(ref(db,'posts/'+key));
    location.hash='';
    return;
  }

  const hashed=await hashPassword(pass);
  if(hashed!==post.password) return alert("비밀번호 틀림");

  await remove(ref(db,'posts/'+key));
  location.hash='';
}

window.deleteComment=async function(postKey,commentKey){
  const pass=prompt("비밀번호 입력");
  if(!pass) return;
  const comment=allPosts[postKey].comments[commentKey];

  if(pass===MASTER_PASSWORD){
    await remove(ref(db,'posts/'+postKey+'/comments/'+commentKey));
    return;
  }

  const hashed=await hashPassword(pass);
  if(hashed!==comment.password) return alert("비밀번호 틀림");

  await remove(ref(db,'posts/'+postKey+'/comments/'+commentKey));
}

function renderWritePage(){
  const container=document.getElementById('postList');
  container.innerHTML=\`
  <div class='card'>
    <div class="top-actions">
      <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>
    </div>
    <h2>게시글 작성</h2>
    <input id='title' placeholder='제목'>
    <input id='nickname' placeholder='닉네임'>
    <input id='password' type='password' placeholder='비밀번호'>
    <textarea id='content' rows='6' placeholder='내용'></textarea>
    <button class="action-btn" onclick='submitPost()'>등록</button>
  </div>\`;

  window.titleEl=document.getElementById('title');
  window.nickEl=document.getElementById('nickname');
  window.passEl=document.getElementById('password');
  window.contentEl=document.getElementById('content');
}

window.submitPost=async function(){
  const title=titleEl.value.trim();
  const nickname=nickEl.value.trim();
  const password=passEl.value;
  const content=contentEl.value.trim();
  if(!title||!nickname||!password||!content) return alert('모든 항목 입력');

  await push(postsRef,{
    title,
    nickname,
    password:await hashPassword(password),
    content,
    date:new Date().toLocaleDateString(),
    comments:{}
  });

  location.hash='';
}

window.addComment=async function(postKey){
  const nick=c_nick.value;
  const pass=c_pass.value;
  const text=c_text.value;
  if(!nick||!pass||!text) return alert('입력');

  const newRef=push(ref(db,'posts/'+postKey+'/comments'));
  await update(newRef,{
    nickname:nick,
    password:await hashPassword(pass),
    text,
    replies:{}
  });
}
</script>

</body>
</html>
