<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getDatabase, ref, push, onValue, update, remove 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import {
  getStorage, ref as sRef, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
  apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain:"community-61897.firebaseapp.com",
  databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
  projectId:"community-61897",
  storageBucket:"community-61897.firebasestorage.app",
  messagingSenderId:"1081865580697",
  appId:"1:1081865580697:web:6ff7e5b838cdbde397c808",
  measurementId:"G-XSNWJ8PT5X"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const storage=getStorage(app);
const postsRef=ref(db,'posts');

let allPosts={};
let selectedPostKey=null;
let currentCategory='all';

window.addEventListener('hashchange',handleRouting);

window.filterCategory=category=>{
  currentCategory=category;
  renderList();
};

window.openForm=function(){
  location.hash="write";
};

function handleRouting(){
  const hash=location.hash.replace('#','');

  if(hash==="write"){
    renderWritePage();
    return;
  }

  selectedPostKey=hash.startsWith('post-')
    ? hash.replace('post-','')
    : null;

  render();
}

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  selectedPostKey?renderDetail(selectedPostKey):renderList();
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';
  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory!=='all'&&post.category!==currentCategory) return;
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div class='meta'>[${post.category||'미분류'}]</div>
      <h3>${post.title}</h3>
      <div class='meta'>${post.nickname}</div>
    `;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });
  if(!container.innerHTML){
    container.innerHTML="<div style='text-align:center;margin-top:120px;'>게시글이 없습니다.</div>";
  }
}

function renderWritePage(){
  const container=document.getElementById('postList');

  container.innerHTML=`
  <div class="card">
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>
    <h2 style="margin-top:15px;">게시글 작성</h2>

    <select id="w_category">
      <option value="공지">공지</option>
      <option value="잡담">잡담</option>
      <option value="정보">정보</option>
      <option value="질문">질문</option>
      <option value="거래">거래</option>
      <option value="도움">도움</option>
    </select>

    <input id="w_nick" placeholder="닉네임">
    <input id="w_pass" type="password" placeholder="비밀번호">
    <input id="w_title" placeholder="제목">
    <textarea id="w_content" rows="8" placeholder="내용"></textarea>

    <label style="margin-top:15px;display:block;">이미지 업로드</label>
    <input type="file" id="w_images" accept="image/*" multiple>

    <label style="margin-top:15px;display:block;">파일 업로드</label>
    <input type="file" id="w_files" multiple>

    <button class="action-btn" style="margin-top:20px;" onclick="submitPost()">작성 완료</button>
  </div>
  `;
}

window.submitPost=async function(){

  const category=document.getElementById('w_category').value;
  const nickname=document.getElementById('w_nick').value.trim();
  const password=document.getElementById('w_pass').value.trim();
  const title=document.getElementById('w_title').value.trim();
  const content=document.getElementById('w_content').value.trim();
  const images=document.getElementById('w_images').files;
  const files=document.getElementById('w_files').files;

  if(!nickname||!password||!title||!content){
    alert("모든 항목을 입력하세요");
    return;
  }

  const imageURLs=[];
  const fileData=[];

  for(let file of images){
    const storageRef=sRef(storage,'images/'+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    imageURLs.push(url);
  }

  for(let file of files){
    const storageRef=sRef(storage,'files/'+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    fileData.push({name:file.name,url});
  }

  const newRef=await push(postsRef,{
    category,
    nickname,
    title,
    content,
    password,
    images:imageURLs,
    files:fileData,
    comments:{}
  });

  location.hash="post-"+newRef.key;
};

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  if(!post){
    container.innerHTML="<div class='card'>존재하지 않는 게시글입니다.</div>";
    return;
  }

  let imageHTML='';
  if(post.images){
    post.images.forEach(url=>{
      imageHTML+=`<img src="${url}" style="max-width:100%;margin-top:15px;border:1px solid #2aff00;">`;
    });
  }

  let fileHTML='';
  if(post.files){
    post.files.forEach(file=>{
      fileHTML+=`<div style="margin-top:10px;">
        📎 <a href="${file.url}" target="_blank" style="color:#9cff57;">${file.name}</a>
      </div>`;
    });
  }

  container.innerHTML=`
  <div class='card'>
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>

    <div class='meta'>[${post.category||'미분류'}]</div>
    <h2>${post.title}</h2>
    <div class='meta'>작성자: ${post.nickname}</div>

    <div style="margin-top:20px; white-space:pre-line;">
      ${post.content}
    </div>

    ${imageHTML}
    ${fileHTML}

    <div style="margin-top:15px;">
      <button class="action-btn" onclick="deletePost('${key}')">삭제</button>
    </div>
  </div>`;
}

window.deletePost=async function(key){
  const input=prompt("비밀번호 입력");
  if(!input) return;

  if(input!==allPosts[key].password && input!==MASTER_PASSWORD){
    alert("비밀번호 불일치");
    return;
  }

  if(confirm("정말 삭제하시겠습니까?")){
    await remove(ref(db,'posts/'+key));
    location.hash='';
  }
};
</script>
