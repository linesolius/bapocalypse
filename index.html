<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin-right:6px;cursor:pointer}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2);cursor:pointer}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px}
.action-btn{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin:6px 4px 6px 0;cursor:pointer}
.comment{margin-top:15px;padding:10px;background:#0f180f;border:1px solid rgba(0,255,0,.2)}
.reply{margin-left:25px;margin-top:10px;padding:10px;background:#0c140c;border:1px solid rgba(0,255,0,.2)}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,.3)}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#111611;
padding:25px;
border:1px solid #2aff00;
width:300px;
}
</style>
</head>

<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="location.hash='write'">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>

<!-- 비밀번호 팝업 -->
<div id="passwordModal" class="modal">
<div class="modal-box">

<h3>비밀번호 입력</h3>

<input type="password" id="modalPassword">

<br><br>

<button class="action-btn" onclick="confirmPassword()">확인</button>
<button class="action-btn" onclick="closePasswordModal()">취소</button>

</div>
</div>

<footer>© 2033 Nuclear Community</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const postsRef=ref(db,'posts');

let allPosts={};
let currentCategory='all';

let deleteTarget=null;

window.addEventListener('hashchange',handleRouting);

function handleRouting(){

const hash=location.hash.replace('#','');

if(hash.startsWith('post-')){
renderDetail(hash.replace('post-',''));
return;
}

renderList();

}

window.filterCategory=function(category){
currentCategory=category;
renderList();
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{};
handleRouting();
});

function renderList(){

const container=document.getElementById('postList');
container.innerHTML='';

const postsArray=Object.entries(allPosts);

postsArray.sort((a,b)=> (b[1].date||0)-(a[1].date||0));

postsArray.forEach(([key,post])=>{

if(currentCategory!=='all' && post.category!==currentCategory) return;

const card=document.createElement('div');
card.className='card';
card.onclick=()=>{location.hash='post-'+key}

card.innerHTML=`
<div class='meta'>[${post.category}] ${escapeHTML(post.nickname)}</div>
<h3>${escapeHTML(post.title)}</h3>
<div>${escapeHTML(post.content).slice(0,120)}...</div>
`;

container.appendChild(card);

});

}

function renderDetail(key){

const post=allPosts[key];
const container=document.getElementById('postList');

if(!post){container.innerHTML='존재하지 않는 글';return}

let commentHTML='';

if(post.comments){

Object.entries(post.comments).forEach(([cid,c])=>{

commentHTML+=`

<div class='comment'>

<b>${escapeHTML(c.nickname)}</b>
<div>${escapeHTML(c.content)}</div>

<button class='action-btn' onclick="toggleReply('${cid}')">답글</button>
<button class='action-btn' onclick="openPasswordModal('comment','${key}','${cid}')">삭제</button>

<div id="replyBox-${cid}" style="display:none">

<input id="r_nick-${cid}" placeholder="닉네임">
<input id="r_pass-${cid}" type="password" placeholder="비밀번호">
<textarea id="r_content-${cid}" placeholder="답글"></textarea>

<button class="action-btn" onclick="submitReply('${key}','${cid}')">답글 작성</button>

</div>

`;

if(c.replies){
Object.entries(c.replies).forEach(([rid,r])=>{
commentHTML+=`
<div class='reply'>
<b>${escapeHTML(r.nickname)}</b>
<div>${escapeHTML(r.content)}</div>
<button class='action-btn' onclick="openPasswordModal('reply','${key}','${cid}','${rid}')">삭제</button>
</div>`;
});
}

commentHTML+='</div>';

});

}

container.innerHTML=`

<div class='card' style="cursor:default">

<button class='action-btn' onclick="location.hash=''">목록</button>

<h2>${escapeHTML(post.title)}</h2>
<p>${escapeHTML(post.content)}</p>

<hr>

<h3>댓글</h3>

${commentHTML}

<hr>

<h3>댓글 작성</h3>

<input id='c_nick' placeholder='닉네임'>
<input id='c_pass' type='password' placeholder='비밀번호'>
<textarea id='c_content' placeholder='댓글'></textarea>

<button class='action-btn' onclick="submitComment('${key}')">댓글 작성</button>

</div>

`;

}

window.submitComment=function(postKey){

const nick=c_nick.value;
const pass=c_pass.value;
const content=c_content.value;

if(!nick||!pass||!content){alert('댓글 입력');return}

push(ref(db,'posts/'+postKey+'/comments'),{
nickname:nick,
password:pass,
content:content,
date:Date.now()
});

c_content.value="";

}

window.toggleReply=function(commentKey){

const box=document.getElementById("replyBox-"+commentKey);

box.style.display = box.style.display==="none" ? "block" : "none";

}

window.submitReply=function(postKey,commentKey){

const nick=document.getElementById("r_nick-"+commentKey).value;
const pass=document.getElementById("r_pass-"+commentKey).value;
const content=document.getElementById("r_content-"+commentKey).value;

if(!nick||!pass||!content){
alert("답글 입력");
return;
}

push(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies'),{
nickname:nick,
password:pass,
content:content,
date:Date.now()
});

}

window.openPasswordModal=function(type,postKey,commentKey,replyKey){

deleteTarget={type,postKey,commentKey,replyKey};

document.getElementById("passwordModal").style.display="flex";

}

window.closePasswordModal=function(){
document.getElementById("passwordModal").style.display="none";
modalPassword.value="";
}

window.confirmPassword=function(){

const pass=modalPassword.value;

if(deleteTarget.type==="comment"){

const comment=allPosts[deleteTarget.postKey].comments[deleteTarget.commentKey];

if(pass!==comment.password && pass!==MASTER_PASSWORD){
alert("비밀번호 틀림");
return;
}

remove(ref(db,'posts/'+deleteTarget.postKey+'/comments/'+deleteTarget.commentKey));

}

if(deleteTarget.type==="reply"){

const reply=allPosts[deleteTarget.postKey].comments[deleteTarget.commentKey].replies[deleteTarget.replyKey];

if(pass!==reply.password && pass!==MASTER_PASSWORD){
alert("비밀번호 틀림");
return;
}

remove(ref(db,'posts/'+deleteTarget.postKey+'/comments/'+deleteTarget.commentKey+'/replies/'+deleteTarget.replyKey));

}

closePasswordModal();

}

function escapeHTML(str){
if(!str) return "";
return str
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}

handleRouting();

</script>
</body>
</html>
