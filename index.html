<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin-right:6px;cursor:pointer}
nav button:hover{box-shadow:0 0 8px #2aff00}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2);cursor:pointer;transition:.2s}
.card:hover{box-shadow:0 0 10px #2aff00;transform:translateY(-2px)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input,select{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px}
.action-btn{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin:6px 4px 6px 0;cursor:pointer}
.action-btn:hover{box-shadow:0 0 10px #2aff00}
.comment{margin-top:15px;padding:10px;background:#0f180f;border:1px solid rgba(0,255,0,.2)}
.reply{margin-left:25px;margin-top:10px;padding:10px;background:#0c140c;border:1px solid rgba(0,255,0,.2)}
.uploaded-image{max-width:100%;margin-top:15px;border:1px solid #2aff00}
footer{text-align:center;padding:40px 0;opacity:.6}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,.3)}
</style>
</head>
<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="location.hash='write'">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>
<footer>© 2033 Nuclear Community</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const MASTER_PASSWORD="porygon2007";

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const storage=getStorage(app);

const postsRef=ref(db,'posts');

let allPosts={};
let currentCategory='all';

window.addEventListener('hashchange',handleRouting);

function handleRouting(){

const hash=location.hash.replace('#','');

if(hash==='write'){
renderWritePage();
return;
}

if(hash.startsWith('post-')){
renderDetail(hash.replace('post-',''));
return;
}

renderList();

}

window.filterCategory=function(category){
currentCategory=category;
renderList();
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{};
handleRouting();
});

function renderList(){

const container=document.getElementById('postList');
container.innerHTML='';

const postsArray=Object.entries(allPosts);

postsArray.sort((a,b)=>{

if((b[1].notice||false)!==(a[1].notice||false)){
return (b[1].notice?1:0)-(a[1].notice?1:0);
}

return (b[1].date||0)-(a[1].date||0);

});

postsArray.forEach(([key,post])=>{

if(currentCategory!=='all' && post.category!==currentCategory) return;

const card=document.createElement('div');
card.className='card';

card.onclick=()=>{location.hash='post-'+key}

card.innerHTML=`
<div class='meta'>${post.notice?'📌':''}[${post.category}] ${escapeHTML(post.nickname)}</div>
<h3>${escapeHTML(post.title)}</h3>
<div>${escapeHTML(post.content).slice(0,120)}...</div>
`;

container.appendChild(card);

});

}

function renderDetail(key){

const post=allPosts[key];
const container=document.getElementById('postList');

if(!post){container.innerHTML='존재하지 않는 글';return}

let imageHTML='';

if(post.images){
post.images.forEach(url=>{
imageHTML+=`<img src="${url}" class="uploaded-image">`
});
}

let fileHTML='';

if(post.files){
post.files.forEach(f=>{
fileHTML+=`<div>📎 <a href="${f.url}" target="_blank">${f.name}</a></div>`
});
}

let commentHTML='';

if(post.comments){

Object.entries(post.comments).forEach(([cid,c])=>{

commentHTML+=`<div class='comment'>
<b>${escapeHTML(c.nickname)}</b>
<div>${escapeHTML(c.content)}</div>
<button class='action-btn' onclick="replyForm('${key}','${cid}')">답글</button>
<button class='action-btn' onclick="deleteComment('${key}','${cid}')">삭제</button>
`;

if(c.replies){
Object.entries(c.replies).forEach(([rid,r])=>{
commentHTML+=`<div class='reply'>
<b>${escapeHTML(r.nickname)}</b>
<div>${escapeHTML(r.content)}</div>
<button class='action-btn' onclick="deleteReply('${key}','${cid}','${rid}')">삭제</button>
</div>`
});
}

commentHTML+='</div>';

});

}

container.innerHTML=`
<div class='card' style="cursor:default">

<button class='action-btn' onclick="location.hash=''">목록</button>
<button class='action-btn' onclick="editPost('${key}')">수정</button>

<div class='meta'>${post.category} | ${post.nickname}</div>

<h2>${escapeHTML(post.title)}</h2>

<p>${escapeHTML(post.content)}</p>

${imageHTML}

<hr>

${fileHTML}

<hr>

<h3>댓글</h3>

<input id='c_nick' placeholder='닉네임'>
<input id='c_pass' type='password' placeholder='비밀번호'>
<textarea id='c_content' placeholder='댓글'></textarea>

<button class='action-btn' onclick="submitComment('${key}')">댓글 작성</button>

${commentHTML}

</div>`;

}

window.submitPost=async function(){

const title=w_title.value;
const nickname=w_nick.value;
const password=w_pass.value;
const content=w_content.value;
const category=w_category.value;

if(!title||!nickname||!password||!content){alert('모든 필드 입력');return}

const imageURLs=[];
const fileData=[];

for(let file of w_images.files){

if(file.size>5*1024*1024){alert('이미지 5MB 이하');return}

const storageRef=sRef(storage,'images/'+Date.now()+file.name);
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);
imageURLs.push(url);

}

for(let file of w_files.files){

const storageRef=sRef(storage,'files/'+Date.now()+file.name);
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);

fileData.push({name:file.name,url});

}

await push(postsRef,{
title,nickname,password,content,category,
notice:w_notice.checked,
date:Date.now(),
images:imageURLs,
files:fileData
});

location.hash='';

}

function renderWritePage(){

const container=document.getElementById('postList');

container.innerHTML=`
<div class='card' style="cursor:default">

<button class='action-btn' onclick="location.hash=''">목록</button>

<h2>게시글 작성</h2>

<select id="w_category">
<option value="공지">공지</option>
<option value="잡담">잡담</option>
<option value="정보">정보</option>
<option value="질문">질문</option>
<option value="거래">거래</option>
<option value="도움">도움</option>
</select>

<input id="w_title" placeholder="제목">
<input id="w_nick" placeholder="닉네임">
<input id="w_pass" type="password" placeholder="비밀번호">
<textarea id="w_content" rows="6" placeholder="내용"></textarea>

<label>이미지 업로드</label>
<input type="file" id="w_images" multiple accept="image/*">

<label>파일 업로드</label>
<input type="file" id="w_files" multiple>

<label>공지 고정</label>
<input type="checkbox" id="w_notice">

<button class="action-btn" onclick="submitPost()">게시</button>

</div>`;

}

window.submitComment=function(postKey){

const nick=c_nick.value;
const pass=c_pass.value;
const content=c_content.value;

if(!nick||!pass||!content){alert('댓글 입력');return}

const commentRef=ref(db,'posts/'+postKey+'/comments');

push(commentRef,{nickname:nick,password:pass,content,date:Date.now()});

c_content.value="";

location.hash='post-'+postKey;

}

window.replyForm=function(postKey,commentKey){

const text=prompt('답글');
const nick=prompt('닉네임');
const pass=prompt('비밀번호');

if(!text||!nick||!pass)return;

const replyRef=ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies');

push(replyRef,{nickname:nick,password:pass,content:text});

location.hash='post-'+postKey;

}

window.editPost=function(key){

const post=allPosts[key];

const pass=prompt('비밀번호 입력');

if(pass!==post.password && pass!==MASTER_PASSWORD){
alert('비밀번호가 틀렸습니다');
return;
}

const newTitle=prompt('새 제목',post.title);
if(newTitle===null) return;

const newContent=prompt('새 내용',post.content);
if(newContent===null) return;

update(ref(db,'posts/'+key),{
title:newTitle,
content:newContent
});

}

window.deleteComment=function(postKey,commentKey){

const pass=prompt('비밀번호');

const comment=allPosts[postKey].comments[commentKey];

if(pass!==comment.password && pass!==MASTER_PASSWORD){
alert('비밀번호 틀림');
return;
}

remove(ref(db,'posts/'+postKey+'/comments/'+commentKey));

}

window.deleteReply=function(postKey,commentKey,replyKey){

const pass=prompt('비밀번호');

const reply=allPosts[postKey].comments[commentKey].replies[replyKey];

if(pass!==reply.password && pass!==MASTER_PASSWORD){
alert('비밀번호 틀림');
return;
}

remove(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies/'+replyKey));

}

function escapeHTML(str){
return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

handleRouting();

</script>
</body>
</html>
