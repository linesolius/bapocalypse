<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{
  background:#132013;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:6px 12px;
  margin-right:6px;
  cursor:pointer;
}
nav button:hover{ box-shadow:0 0 8px #2aff00; }

.write-btn{
  background:#1a2a1a;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px 14px;
  cursor:pointer;
}

.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}

textarea,input,select{
  width:100%;
  margin-top:10px;
  background:#0f140f;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:8px;
}

.action-btn{
  background:#132013;
  border:1px solid #2aff00;
  color:#9cff57;
  padding:6px 12px;
  margin:6px 4px 6px 0;
  cursor:pointer;
}
.action-btn:hover{ box-shadow:0 0 10px #2aff00; }

.reply-box{
  margin-left:25px;
  margin-top:10px;
  padding:10px;
  background:#0f180f;
  border:1px solid rgba(0,255,0,0.2);
  display:none; /* 🔥 기본은 숨김 */
}

footer{text-align:center;padding:40px 0;opacity:0.6}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,0.3)}
</style>
</head>
<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="openForm()">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>
<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const MASTER_PASSWORD = "porygon2007"; // 🔥 마스터 비밀번호

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6ff7e5b838cdbde397c808",
  measurementId: "G-XSNWJ8PT5X"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts={};
let selectedPostKey=null;
let currentCategory='all';

window.addEventListener('hashchange',handleRouting);

window.filterCategory=function(category){
  currentCategory=category;
  renderList();
}

window.openForm=()=>location.hash='write';

async function hashPassword(password){
  const encoder=new TextEncoder();
  const data=encoder.encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPermission(input,savedHash){
  if(input===MASTER_PASSWORD) return true;
  return (await hashPassword(input))===savedHash;
}

function handleRouting(){
  const hash=location.hash.replace('#','');
  if(hash.startsWith('post-')){
    selectedPostKey=hash.replace('post-','');
  }else{
    selectedPostKey=null;
  }
  render();
}

onValue(postsRef,(snap)=>{
  allPosts=snap.val()||{};
  render();
});

function render(){
  if(selectedPostKey){
    renderDetail(selectedPostKey);
  }else{
    renderList();
  }
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';

  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory!=='all' && post.category!==currentCategory) return;

    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <div class='meta'>[${post.category||'미분류'}]</div>
      <h3>${post.title}</h3>
      <div class='meta'>${post.nickname}</div>
    `;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });

  if(!container.innerHTML){
    container.innerHTML="<div style='text-align:center;margin-top:120px;'>게시글이 없습니다.</div>";
  }
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  if(!post){
    container.innerHTML="<div class='card'>존재하지 않는 게시글입니다.</div>";
    return;
  }

  let commentsHTML='';

  if(post.comments){
    Object.entries(post.comments).forEach(([cid,c])=>{
      commentsHTML+=`
      <div style="margin-top:20px;border-top:1px solid #1f3f1f;padding-top:10px;">
        <b>${c.nickname}</b>
        <div>${c.text}</div>
        <button class="action-btn" onclick="deleteComment('${key}','${cid}')">삭제</button>
        <button class="action-btn" onclick="toggleReplyBox('${cid}')" id="btn_${cid}">답글</button>
      `;

      if(c.replies){
        Object.entries(c.replies).forEach(([rid,r])=>{
          commentsHTML+=`
          <div class="reply-box" style="display:block;">
            <b>${r.nickname}</b>
            <div>${r.text}</div>
            <button class="action-btn" onclick="deleteReply('${key}','${cid}','${rid}')">삭제</button>
          </div>`;
        });
      }

      commentsHTML+=`
        <div class="reply-box" id="reply_${cid}">
          <input id="r_nick_${cid}" placeholder="닉네임">
          <input id="r_pass_${cid}" type="password" placeholder="비밀번호">
          <input id="r_text_${cid}" placeholder="답글">
          <button class="action-btn" onclick="addReply('${key}','${cid}')">답글 등록</button>
        </div>
      </div>`;
    });
  }

  container.innerHTML=`
  <div class='card'>
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>

    <div class='meta'>[${post.category||'미분류'}]</div>
    <h2>${post.title}</h2>
    <div class='meta'>작성자: ${post.nickname}</div>

    <div style="margin-top:20px; white-space:pre-line;">
      ${post.content}
    </div>

    <hr>
    <h3>댓글</h3>

    ${commentsHTML}

    <div style="margin-top:20px;">
      <input id="c_nick" placeholder="닉네임">
      <input id="c_pass" type="password" placeholder="비밀번호">
      <textarea id="c_text" rows="3" placeholder="댓글"></textarea>
      <button class="action-btn" onclick="addComment('${key}')">댓글 등록</button>
    </div>
  </div>`;
}

// 🔥 답글 토글
window.toggleReplyBox=function(cid){
  document.querySelectorAll('.reply-box').forEach(box=>{
    if(box.id && box.id.startsWith('reply_')) box.style.display='none';
  });

  document.querySelectorAll('[id^="btn_"]').forEach(btn=>{
    btn.innerText='답글';
  });

  const box=document.getElementById('reply_'+cid);
  const btn=document.getElementById('btn_'+cid);

  if(box.style.display==='block'){
    box.style.display='none';
    btn.innerText='답글';
  }else{
    box.style.display='block';
    btn.innerText='취소';
  }
};

// 댓글 삭제 (마스터 포함)
window.deleteComment=async function(postKey,cid){
  const input=prompt("비밀번호 입력");
  if(!input) return;
  const saved=allPosts[postKey].comments[cid].password;
  if(!(await checkPermission(input,saved))) return alert("비밀번호 불일치");
  remove(ref(db,'posts/'+postKey+'/comments/'+cid));
};

// 답글 삭제 (마스터 포함)
window.deleteReply=async function(postKey,cid,rid){
  const input=prompt("비밀번호 입력");
  if(!input) return;
  const saved=allPosts[postKey].comments[cid].replies[rid].password;
  if(!(await checkPermission(input,saved))) return alert("비밀번호 불일치");
  remove(ref(db,'posts/'+postKey+'/comments/'+cid+'/replies/'+rid));
};
</script>

</body>
</html>
