<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;border-bottom:1px solid #2aff00}
.topbar{display:flex;justify-content:space-between;align-items:center}
nav{margin-top:10px}
nav button{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin-right:6px;cursor:pointer}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2);cursor:pointer}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input,select{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px}
.action-btn{background:#132013;border:1px solid #2aff00;color:#9cff57;padding:6px 12px;margin:6px 4px 6px 0;cursor:pointer}
.comment{margin-top:15px;padding:10px;background:#0f180f;border:1px solid rgba(0,255,0,.2)}
.reply{margin-left:25px;margin-top:10px;padding:10px;background:#0c140c;border:1px solid rgba(0,255,0,.2)}
hr{margin:20px 0;border:0;border-top:1px solid rgba(0,255,0,.3)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;}
.modal-box{background:#111611;padding:25px;border:1px solid #2aff00;width:300px;}
.time{font-size:11px;color:#6cff3c;margin-top:5px;}
.comment-count{font-size:12px;color:#7dff4f;margin-top:6px;}
</style>
</head>

<body>

<header>
<div class="topbar">
<h1>Nuclear Community</h1>
<button class="write-btn" onclick="renderWrite()">게시하기</button>
</div>

<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
</header>

<div class="container" id="postList"></div>

<footer>© 2033 Nuclear Community</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const ADMIN_CODE="torso1989";
const MASTER_DELETE_CODE="porygon2007";

const firebaseConfig={
apiKey:"AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain:"community-61897.firebaseapp.com",
databaseURL:"https://community-61897-default-rtdb.firebaseio.com",
projectId:"community-61897",
storageBucket:"community-61897.appspot.com",
messagingSenderId:"1081865580697",
appId:"1:1081865580697:web:6ff7e5b838cdbde397c808"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const postsRef=ref(db,'posts');

let allPosts={};
let currentCategory='all';

window.filterCategory=function(category){
currentCategory=category;
renderList();
}

onValue(postsRef,(snap)=>{
allPosts=snap.val()||{};
renderList();
});

function countComments(post){
let count=0;
if(!post.comments) return 0;
Object.values(post.comments).forEach(c=>{
count++;
if(c.replies){
count+=Object.keys(c.replies).length;
}
});
return count;
}

window.renderList=function(){

const container=document.getElementById('postList');
container.innerHTML='';

const postsArray=Object.entries(allPosts);

const pinnedNotice=postsArray.filter(([k,p])=>p.category==="공지" && p.pinned);

const normalPosts=postsArray.filter(([k,p])=>{
if(currentCategory==="all") return !(p.category==="공지" && p.pinned);
return p.category===currentCategory && !(p.category==="공지" && p.pinned);
});

pinnedNotice.sort((a,b)=>(b[1].date||0)-(a[1].date||0));
normalPosts.sort((a,b)=>(b[1].date||0)-(a[1].date||0));

const finalList=[...pinnedNotice,...normalPosts];

finalList.forEach(([key,post])=>{

const commentCount=countComments(post);

const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<div class='meta'>[${post.category}] ${escapeHTML(post.nickname)}</div>
<h3>${post.pinned?'📌 ':''}${escapeHTML(post.title)}</h3>
<div>${escapeHTML(post.content).slice(0,120)}...</div>
<div class="time">${formatTime(post.date)}</div>
<div class="comment-count">댓글 ${commentCount}</div>
<button class="action-btn" onclick="deletePost('${key}','${post.password}')">삭제</button>
`;

container.appendChild(card);

});

}

window.renderWrite=function(){

const container=document.getElementById('postList');

container.innerHTML=`

<div class="card" style="cursor:default">

<h2>글 작성</h2>

<select id="w_category">
<option>공지</option>
<option>잡담</option>
<option>정보</option>
<option>질문</option>
<option>거래</option>
<option>도움</option>
</select>

<label style="display:block;margin-top:10px">
<input type="checkbox" id="w_pin"> 공지 상단 고정
</label>

<input id="admin_code" placeholder="관리자 코드 (공지 작성 시 필요)">
<input id="w_nick" placeholder="닉네임">
<input id="w_pass" type="password" placeholder="비밀번호">
<input id="w_title" placeholder="제목">

<textarea id="w_content" placeholder="내용"></textarea>

<button class="action-btn" onclick="submitPost()">게시하기</button>
<button class="action-btn" onclick="renderList()">취소</button>

</div>

`;

}

window.submitPost=function(){

const category=w_category.value;

if(category==="공지"){
if(admin_code.value!==ADMIN_CODE){
alert("공지 작성은 관리자만 가능합니다");
return;
}
}

push(postsRef,{
category:category,
nickname:w_nick.value,
password:w_pass.value,
title:w_title.value,
content:w_content.value,
pinned:w_pin.checked,
date:Date.now()
});

renderList();

}

window.deletePost=function(key,postPassword){

const input=prompt("비밀번호 또는 관리자 삭제코드 입력");

if(input===postPassword || input===MASTER_DELETE_CODE){
remove(ref(db,'posts/'+key));
}else{
alert("비밀번호가 틀렸습니다");
}

}

function formatTime(timestamp){
if(!timestamp) return "";
const d=new Date(timestamp);
return `2033.${d.getMonth()+1}.${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
}

function escapeHTML(str){
if(!str) return "";
return str
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}

</script>
</body>
</html>
