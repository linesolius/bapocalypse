<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6ff7e5b838cdbde397c808",
  measurementId: "G-XSNWJ8PT5X"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db,'posts');

let allPosts = {};
let selectedPostKey = null;
let currentCategory = 'all';

window.addEventListener('hashchange', handleRouting);

window.filterCategory = function(category){
  currentCategory = category;
  renderList();
}

window.openForm = () => location.hash = 'write';

async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function handleRouting(){
  const hash = location.hash.replace('#','');

  if(hash === 'write'){
    selectedPostKey = null;
    renderWritePage();
    return;
  }

  if(hash.startsWith('post-')){
    selectedPostKey = hash.slice(5); 
    renderDetail(selectedPostKey);
    return;
  }

  selectedPostKey = null;
  renderList();
}

onValue(postsRef,(snap)=>{
  allPosts = snap.val() || {};
  renderList();
});

function renderList(){
  const container = document.getElementById('postList');
  container.innerHTML = '';

  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory !== 'all' && post.category !== currentCategory) return;

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class='meta'>[${post.category || '미분류'}]</div>
      <h3>${post.title}</h3>
      <div class='meta'>${post.nickname}</div>
    `;
    
    div.addEventListener('click', () => {
      location.hash = 'post-'+key;
    });

    container.appendChild(div);
  });

  if(!container.innerHTML){
    container.innerHTML="<div style='text-align:center;margin-top:120px;'>게시글이 없습니다.</div>";
  }
}

function renderDetail(key){
  const post = allPosts[key];
  const container = document.getElementById('postList');

  if(!post){
    container.innerHTML = "<div class='card'>존재하지 않는 게시글입니다.</div>";
    return;
  }

  container.innerHTML = `
  <div class='card'>
    <button class="action-btn" onclick="location.hash=''">← 돌아가기</button>

    <div class='meta'>[${post.category||'미분류'}]</div>
    <h2>${post.title}</h2>
    <div class='meta'>
      작성자: ${post.nickname} | ${post.date||''}
    </div>

    <div style="margin-top:20px; white-space:pre-line;">
      ${post.content}
    </div>

    <div style="margin-top:20px;">
      <button class="action-btn" onclick="showPostEdit('${key}')">수정</button>
      <button class="action-btn" onclick="showPostDelete('${key}')">삭제</button>
    </div>

    <div id="post-edit"></div>
  </div>`;
}

// 수정/삭제 함수들은 그대로 유지하면 됩니다
// submitPost 함수도 그대로 유지하세요

</script>

</body>
</html>
