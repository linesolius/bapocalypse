<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2aff00}
header h1{letter-spacing:2px;text-shadow:0 0 8px rgba(0,255,0,0.8)}
nav button{background:none;border:1px solid rgba(0,255,0,0.2);color:#7dff3a;margin-right:8px;padding:6px 10px;cursor:pointer}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input,select{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px;outline:none}
button{cursor:pointer}
.comment{margin-top:15px;padding:10px;border:1px solid rgba(0,255,0,0.2)}
.reply{margin-left:20px;margin-top:10px;border-left:2px solid #2aff00;padding-left:10px}
footer{text-align:center;padding:40px 0;opacity:0.6}
</style>
</head>
<body>

<header>
<h1>Nuclear Community</h1>
<nav id="categoryNav">
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
<button class="write-btn" onclick="openForm()">게시하기</button>
</header>

<div class="container" id="postList"></div>

<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6890110c8db86e0f97c808",
  measurementId: "G-8NMHM0H7YQ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db, 'posts');

let allPosts = {};
let selectedPostKey = null;

window.addEventListener('hashchange', handleRouting);

async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

function handleRouting(){
  const hash = location.hash.replace('#','');
  if(hash === 'write') return renderWritePage();
  if(hash.startsWith('post-')) selectedPostKey = hash.replace('post-','');
  else selectedPostKey = null;
  render();
}

window.openForm = ()=> location.hash='write';

window.submitPost = async function(){
  const title = titleEl.value.trim();
  const nickname = nickEl.value.trim();
  const password = passEl.value;
  const content = contentEl.value.trim();

  if(!title||!nickname||!password||!content) return alert('모든 항목 입력');

  await push(postsRef,{
    title,
    nickname,
    password: await hashPassword(password),
    content,
    date:new Date().toLocaleDateString(),
    comments:{}
  });

  location.hash='';
}

onValue(postsRef,(snap)=>{
  allPosts = snap.val() || {};
  render();
});

function render(){
  if(selectedPostKey) renderDetail(selectedPostKey);
  else renderList();
}

function renderWritePage(){
  const container=document.getElementById('postList');
  container.innerHTML=`
  <div class='card'>
    <button onclick="location.hash=''">← 돌아가기</button>
    <h2>게시글 작성</h2>
    <input id='title' placeholder='제목'>
    <input id='nickname' placeholder='닉네임'>
    <input id='password' type='password' placeholder='비밀번호'>
    <textarea id='content' rows='6' placeholder='내용'></textarea>
    <button onclick='submitPost()'>등록</button>
  </div>`;

  window.titleEl = document.getElementById('title');
  window.nickEl = document.getElementById('nickname');
  window.passEl = document.getElementById('password');
  window.contentEl = document.getElementById('content');
}

function renderList(){
  const container=document.getElementById('postList');
  container.innerHTML='';

  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${post.title}</h3><div class='meta'>${post.nickname}</div>`;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });

  if(container.innerHTML===''){
    container.innerHTML="<div style='text-align:center;margin-top:120px;'>게시글이 없습니다.</div>";
  }
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  let commentsHTML='';
  if(post.comments){
    Object.entries(post.comments).forEach(([cid,c])=>{
      commentsHTML+=`
      <div class='comment'>
        <b>${c.nickname}</b>
        <div>${c.text}</div>
        <button onclick="showCommentEdit('${key}','${cid}')">수정</button>
        <button onclick="showCommentDelete('${key}','${cid}')">삭제</button>
        <div id='comment-edit-${cid}'></div>
      `;

      if(c.replies){
        Object.entries(c.replies).forEach(([rid,r])=>{
          commentsHTML+=`
          <div class='reply'>
            <b>${r.nickname}</b>
            <div>${r.text}</div>
            <button onclick="showReplyEdit('${key}','${cid}','${rid}')">수정</button>
            <button onclick="showReplyDelete('${key}','${cid}','${rid}')">삭제</button>
            <div id='reply-edit-${rid}'></div>
          </div>`;
        });
      }

      commentsHTML+=`<button onclick="showReplyForm('${key}','${cid}')">답글</button>
      <div id='reply-form-${cid}'></div>
      </div>`;
    });
  }

  container.innerHTML=`
  <div class='card'>
    <button onclick="location.hash=''">← 돌아가기</button>
    <h2>${post.title}</h2>
    <div>${post.content}</div>
    <button onclick="showPostEdit('${key}')">수정</button>
    <button onclick="showPostDelete('${key}')">삭제</button>
    <div id='post-edit'></div>
    <hr>
    <h3>댓글</h3>
    ${commentsHTML}
    <input id='c_nick' placeholder='닉네임'>
    <input id='c_pass' type='password' placeholder='비밀번호'>
    <textarea id='c_text' rows='3' placeholder='댓글'></textarea>
    <button onclick="addComment('${key}')">댓글 등록</button>
  </div>`;
}

window.showPostDelete=function(key){
  document.getElementById('post-edit').innerHTML=`
    <input id='del_pass' type='password' placeholder='비밀번호'>
    <button onclick="deletePost('${key}')">확인 삭제</button>`;
}

window.deletePost=async function(key){
  const input=document.getElementById('del_pass').value;
  if(await hashPassword(input)!==allPosts[key].password) return alert('비밀번호 불일치');
  remove(ref(db,'posts/'+key));
  location.hash='';
}

window.showPostEdit=function(key){
  document.getElementById('post-edit').innerHTML=`
    <input id='edit_pass' type='password' placeholder='비밀번호'>
    <button onclick="confirmPostEdit('${key}')">확인</button>`;
}

window.confirmPostEdit=async function(key){
  const input=document.getElementById('edit_pass').value;
  if(await hashPassword(input)!==allPosts[key].password) return alert('비밀번호 불일치');

  document.getElementById('post-edit').innerHTML=`
    <input id='edit_title' value="${allPosts[key].title}">
    <textarea id='edit_content'>${allPosts[key].content}</textarea>
    <button onclick="savePostEdit('${key}')">저장</button>`;
}

window.savePostEdit=function(key){
  update(ref(db,'posts/'+key),{
    title:document.getElementById('edit_title').value,
    content:document.getElementById('edit_content').value
  });
  location.hash='post-'+key;
}

window.addComment=async function(postKey){
  const nick=c_nick.value;
  const pass=c_pass.value;
  const text=c_text.value;
  if(!nick||!pass||!text) return alert('입력');

  const newRef=push(ref(db,'posts/'+postKey+'/comments'));
  await update(newRef,{ nickname:nick, password:await hashPassword(pass), text, replies:{} });
}

window.showCommentDelete=function(postKey,commentKey){
  document.getElementById('comment-edit-'+commentKey).innerHTML=`
    <input id='cd_pass-${commentKey}' type='password' placeholder='비밀번호'>
    <button onclick="deleteComment('${postKey}','${commentKey}')">삭제</button>`;
}

window.deleteComment=async function(postKey,commentKey){
  const input=document.getElementById('cd_pass-'+commentKey).value;
  if(await hashPassword(input)!==allPosts[postKey].comments[commentKey].password) return alert('불일치');
  remove(ref(db,'posts/'+postKey+'/comments/'+commentKey));
}

window.showReplyDelete=function(postKey,commentKey,replyKey){
  document.getElementById('reply-edit-'+replyKey).innerHTML=`
    <input id='rd_pass-${replyKey}' type='password' placeholder='비밀번호'>
    <button onclick="deleteReply('${postKey}','${commentKey}','${replyKey}')">삭제</button>`;
}

window.deleteReply=async function(postKey,commentKey,replyKey){
  const input=document.getElementById('rd_pass-'+replyKey).value;
  if(await hashPassword(input)!==allPosts[postKey].comments[commentKey].replies[replyKey].password) return alert('불일치');
  remove(ref(db,'posts/'+postKey+'/comments/'+commentKey+'/replies/'+replyKey));
}

</script>

</body>
</html>
