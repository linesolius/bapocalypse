<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Community</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}

body{
  background:#0a0d0a;
  color:#9cff57;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,255,0,0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,255,0,0.04) 0%, transparent 40%),
    repeating-linear-gradient(45deg, rgba(0,255,0,0.02) 0px, rgba(0,255,0,0.02) 2px, transparent 2px, transparent 6px);
}

header{
  background:#111411;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #2aff00;
  box-shadow:0 0 15px rgba(0,255,0,0.2);
}

header h1{
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
  text-shadow:0 0 8px rgba(0,255,0,0.8);
}

nav button{
  background:none;
  border:1px solid rgba(0,255,0,0.2);
  color:#7dff3a;
  margin-right:10px;
  cursor:pointer;
  font-size:13px;
  padding:6px 10px;
  transition:0.2s
}

nav button:hover{
  background:rgba(0,255,0,0.1);
  box-shadow:0 0 8px rgba(0,255,0,0.6);
}

.write-btn{
  background:#1a2a1a;
  padding:10px 18px;
  border-radius:4px;
  border:1px solid #2aff00;
  color:#9cff57;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 0 10px rgba(0,255,0,0.3);
}

.container{max-width:1100px;margin:40px auto;padding:0 20px}

.card{
  background:#111611;
  padding:20px;
  border-radius:6px;
  margin-bottom:20px;
  border:1px solid rgba(0,255,0,0.15);
  transition:0.2s;
  cursor:pointer;
  box-shadow:0 0 12px rgba(0,255,0,0.08);
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 0 18px rgba(0,255,0,0.3);
}

.card h3{font-size:17px;margin-bottom:8px;color:#b6ff7a}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
.preview{color:#8aff55;font-size:14px}

#formModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center
}

.modal-content{
  background:#0f140f;
  padding:30px;
  border-radius:6px;
  width:90%;
  max-width:500px;
  border:1px solid #2aff00;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
}

.modal-content input,
.modal-content select,
.modal-content textarea{
  width:100%;
  margin-bottom:12px;
  padding:10px;
  border-radius:4px;
  border:1px solid rgba(0,255,0,0.2);
  background:#0a0d0a;
  color:#9cff57
}

.modal-content button{
  width:100%;
  padding:12px;
  border:1px solid #2aff00;
  border-radius:4px;
  background:#111611;
  color:#9cff57;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,255,0,0.3);
}

footer{
  text-align:center;
  padding:40px 0;
  color:#3cff00;
  font-size:12px;
  opacity:0.6
}
</style>
</head>
<body>

<header>
<h1>Nuclear Community</h1>
<nav>
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
<button class="write-btn" onclick="openForm()">게시하기</button>
</header>

<div class="container" id="postList"></div>

<div id="formModal">
  <div class="modal-content">
    <input type="text" id="nickname" placeholder="닉네임" />
    <input type="password" id="password" placeholder="삭제 비밀번호" />
    <select id="category">
      <option>공지</option>
      <option>잡담</option>
      <option>정보</option>
      <option>질문</option>
      <option>거래</option>
      <option>도움</option>
    </select>
    <input type="text" id="title" placeholder="제목" />
    <textarea id="content" rows="5" placeholder="내용"></textarea>
    <button onclick="addPost()">게시</button>
  </div>
</div>

<footer>© 2026 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain: "community-61897.firebaseapp.com",
databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
projectId: "community-61897",
storageBucket: "community-61897.firebasestorage.app",
messagingSenderId: "1081865580697",
appId: "1:1081865580697:web:6890110c8db86e0f97c808",
measurementId: "G-8NMHM0H7YQ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db, 'posts');

let currentCategory = 'all';
let allPosts = {};
let selectedPostKey = null;

window.openForm = function(){
  document.getElementById('formModal').style.display='flex';
}

window.addPost = function(){
  const nickname=document.getElementById('nickname').value;
  const category=document.getElementById('category').value;
  const title=document.getElementById('title').value;
  const content=document.getElementById('content').value;

  push(postsRef,{
    nickname,category,title,content,
    date:`2033 - ` + new Date().toLocaleString(),
    comments: []
  });

  document.getElementById('formModal').style.display='none';
}

window.filterCategory=function(cat){
  currentCategory=cat;
  renderPosts();
}

onValue(postsRef,(snapshot)=>{
  allPosts=snapshot.val()||{};
  renderPosts();
});

function renderPosts(){
  const postList=document.getElementById('postList');
  postList.innerHTML='';

  if(selectedPostKey){
    renderDetail(selectedPostKey);
    return;
  }

  Object.entries(allPosts).reverse().forEach(([key,post])=>{
    if(currentCategory!=='all' && post.category!==currentCategory) return;

    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <h3>[${post.category}] ${post.title}</h3>
      <div class="meta">${post.nickname} · ${post.date}</div>
    `;

    div.addEventListener('click',()=>{
      selectedPostKey = key;
      renderPosts();
    });

    postList.appendChild(div);
  });
}

function renderDetail(key){
  const post = allPosts[key];
  const postList=document.getElementById('postList');

  postList.innerHTML=`
    <div class="card">
      <button onclick="goBack()" style="margin-bottom:15px;">← 돌아가기</button>
      <h2>[${post.category}] ${post.title}</h2>
      <div class="meta">${post.nickname} · ${post.date}</div>
      <div style="margin-top:20px; white-space:pre-line;">${post.content}</div>
    </div>
    <div class="card">
      <h3>☢ 댓글</h3>
      <div id="commentSection"></div>
    </div>
  `;

  renderComments(post.comments || []);
}

function renderComments(comments){
  const section=document.getElementById('commentSection');
  section.innerHTML='';

  if(comments.length===0){
    section.innerHTML='<div class="meta">아직 댓글이 없습니다.</div>';
    return;
  }

  comments.forEach(c=>{
    const div=document.createElement('div');
    div.style.marginBottom='10px';
    div.innerHTML=`<div class="meta">${c.nickname} · ${c.date}</div><div>${c.text}</div>`;
    section.appendChild(div);
  });
}

window.goBack=function(){
  selectedPostKey=null;
  renderPosts();
}
</script>

</body>
</html>
