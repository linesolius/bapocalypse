<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Community</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Courier New',monospace}
body{background:#0a0d0a;color:#9cff57}
header{background:#111411;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2aff00}
header h1{letter-spacing:2px;text-shadow:0 0 8px rgba(0,255,0,0.8)}
nav button{background:none;border:1px solid rgba(0,255,0,0.2);color:#7dff3a;margin-right:8px;padding:6px 10px;cursor:pointer}
.write-btn{background:#1a2a1a;border:1px solid #2aff00;color:#9cff57;padding:8px 14px;cursor:pointer}
.container{max-width:1000px;margin:40px auto;padding:0 20px}
.card{background:#111611;padding:20px;margin-bottom:20px;border:1px solid rgba(0,255,0,0.2)}
.meta{font-size:12px;color:#5eff2a;margin-bottom:10px}
textarea,input,select{width:100%;margin-top:10px;background:#0f140f;border:1px solid #2aff00;color:#9cff57;padding:8px}
button{cursor:pointer}
.comment{margin-top:15px;padding:10px;border:1px solid rgba(0,255,0,0.2)}
.reply{margin-left:20px;margin-top:10px;border-left:2px solid #2aff00;padding-left:10px}
footer{text-align:center;padding:40px 0;opacity:0.6}
</style>
</head>
<body>

<header>
<h1>Nuclear Community</h1>
<nav id="categoryNav">
<button onclick="filterCategory('all')">전체</button>
<button onclick="filterCategory('공지')">공지</button>
<button onclick="filterCategory('잡담')">잡담</button>
<button onclick="filterCategory('정보')">정보</button>
<button onclick="filterCategory('질문')">질문</button>
<button onclick="filterCategory('거래')">거래</button>
<button onclick="filterCategory('도움')">도움</button>
</nav>
<button class="write-btn" onclick="openForm()">게시하기</button>
</header>

<div class="container" id="postList"></div>

<footer>© 2033 Nuclear Community</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
  authDomain: "community-61897.firebaseapp.com",
  databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
  projectId: "community-61897",
  storageBucket: "community-61897.firebasestorage.app",
  messagingSenderId: "1081865580697",
  appId: "1:1081865580697:web:6890110c8db86e0f97c808",
  measurementId: "G-8NMHM0H7YQ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db, 'posts');

let currentCategory = 'all';
let allPosts = {};
let selectedPostKey = null;

window.addEventListener('hashchange', handleRouting);

function handleRouting(){
  const hash = location.hash.replace('#','');

  if(hash === 'write'){
    renderWritePage();
    return;
  }

  if(hash.startsWith('post-')){
    const key = hash.replace('post-','');
    selectedPostKey = allPosts[key] ? key : null;
  }else{
    selectedPostKey = null;
  }

  renderPosts();
}

window.filterCategory = function(cat){
  currentCategory = cat;
  renderPosts();
}

window.openForm = function(){
  location.hash = 'write';
}

// 🔐 SHA-256 해시 함수
async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

window.submitPost = async function(){
  const title = document.getElementById('title').value.trim();
  const nickname = document.getElementById('nickname').value.trim();
  const password = document.getElementById('password').value;
  const category = document.getElementById('category').value;
  const content = document.getElementById('content').value.trim();

  if(!title || !nickname || !password || !content){
    alert('모든 항목을 입력하세요');
    return;
  }

  const hashedPassword = await hashPassword(password);

  await push(postsRef,{
    title,
    nickname,
    password: hashedPassword,
    category,
    content,
    date: new Date().toLocaleDateString(),
    comments:{}
  });

  alert('게시글이 등록되었습니다');
  location.hash='';
}

onValue(postsRef,(snapshot)=>{
  allPosts = snapshot.val() || {};
  handleRouting();
});

function renderWritePage(){
  const nav = document.getElementById('categoryNav');
  const container = document.getElementById('postList');
  nav.style.display='none';

  container.innerHTML=`
  <div class="card">
    <button onclick="location.hash=''">← 돌아가기</button>
    <h2>게시글 작성</h2>
    <input id="title" placeholder="제목" />
    <input id="nickname" placeholder="닉네임" />
    <input id="password" type="password" placeholder="비밀번호 (수정용)" />
    <select id="category">
      <option value="잡담">잡담</option>
      <option value="정보">정보</option>
      <option value="질문">질문</option>
      <option value="거래">거래</option>
      <option value="도움">도움</option>
      <option value="공지">공지</option>
    </select>
    <textarea id="content" rows="6" placeholder="내용"></textarea>
    <button onclick="submitPost()">등록</button>
  </div>`;
}

function renderPosts(){
  const nav=document.getElementById('categoryNav');
  const container=document.getElementById('postList');
  container.innerHTML='';

  if(selectedPostKey){ nav.style.display='none'; renderDetail(selectedPostKey); return; }
  nav.style.display='block';

  const entries=Object.entries(allPosts);
  const notices=entries.filter(([_,p])=>p.category==='공지');
  const normal=entries.filter(([_,p])=>p.category!=='공지');
  const ordered=[...notices,...normal].reverse();

  ordered.forEach(([key,post])=>{
    if(post.category!=='공지'){
      if(currentCategory!=='all' && post.category!==currentCategory) return;
    }

    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<h3>${post.title}</h3><div class='meta'>${post.nickname} · ${post.date}</div>`;
    div.onclick=()=>location.hash='post-'+key;
    container.appendChild(div);
  });

  if(container.children.length===0){
    container.innerHTML=`<div style='text-align:center;margin-top:120px;font-size:18px;opacity:0.7;'>게시글이 없습니다.</div>`;
  }
}

function renderDetail(key){
  const post=allPosts[key];
  const container=document.getElementById('postList');

  container.innerHTML=`
  <div class='card'>
    <button onclick="location.hash=''">← 돌아가기</button>
    <h2>${post.title}</h2>
    <div class='meta'>${post.nickname} · ${post.date}</div>
    <div style='margin-top:20px;white-space:pre-line;'>${post.content}</div>
    <button onclick="editPost('${key}')">수정</button>
  </div>`;
}

window.editPost = async function(key){
  const post = allPosts[key];
  const input = prompt('비밀번호를 입력하세요');
  if(!input) return;

  const hashedInput = await hashPassword(input);

  if(hashedInput !== post.password){
    alert('비밀번호가 일치하지 않습니다');
    return;
  }

  const container=document.getElementById('postList');
  container.innerHTML=`
  <div class='card'>
    <h2>게시글 수정</h2>
    <input id='edit_title' value="${post.title}" />
    <textarea id='edit_content' rows='6'>${post.content}</textarea>
    <button onclick="saveEdit('${key}')">저장</button>
    <button onclick="location.hash='post-${key}'">취소</button>
  </div>`;
}

window.saveEdit = function(key){
  const newTitle=document.getElementById('edit_title').value;
  const newContent=document.getElementById('edit_content').value;

  update(ref(db,'posts/'+key),{
    title:newTitle,
    content:newContent
  });

  location.hash='post-'+key;
}

</script>

</body>
</html>
