<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Realtime Community</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#f4f6f9}
header{background:#4a6cf7;color:white;padding:1rem;text-align:center}
.container{max-width:1000px;margin:2rem auto;padding:1rem}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.post-form{background:white;padding:1rem;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:2rem}
input,textarea,select{width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid #ccc;border-radius:4px}
button{background:#4a6cf7;color:white;border:none;padding:0.5rem 1rem;border-radius:6px;cursor:pointer}
.delete-btn{background:#e53935}
.back-btn{background:#777;margin-bottom:1rem}
.category-bar{margin-bottom:1rem}
.category-bar button{margin-right:0.5rem;margin-bottom:0.5rem;background:#ddd;color:#333}
.category-bar button.active{background:#4a6cf7;color:white}
table{width:100%;border-collapse:collapse;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
th,td{padding:0.8rem;text-align:center;border-bottom:1px solid #eee}
th{background:#f1f3f5}
tr:hover{background:#fafafa;cursor:pointer}
.notice-row{background:#fff3e0;font-weight:bold}
.post-view{background:white;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.post-view h2{margin-bottom:1rem}
.post-meta{color:#666;margin-bottom:1.5rem}
.post-content{white-space:pre-wrap;line-height:1.6}
.hidden{display:none}
</style>
</head>
<body>
<header>
<h1>📋 게시판 커뮤니티</h1>
</header>
<div class="container">

<div class="top-bar">
<h2>게시판</h2>
<button onclick="toggleForm()">게시하기</button>
</div>

<div id="formSection" class="post-form hidden">
<h3>글 작성</h3>
<select id="category">
<option value="공지">공지</option>
<option value="잡담">잡담</option>
<option value="정보">정보</option>
<option value="질문">질문</option>
<option value="거래">거래</option>
<option value="도움">도움</option>
</select>
<input id="nickname" placeholder="닉네임" required>
<input id="password" type="password" placeholder="삭제용 비밀번호" required>
<input id="title" placeholder="제목" required>
<textarea id="content" rows="4" placeholder="내용" required></textarea>
<button onclick="addPost()">등록</button>
</div>

<div class="category-bar" id="categoryBar"></div>

<div id="listSection">
<table>
<thead>
<tr>
<th>번호</th>
<th>카테고리</th>
<th>제목</th>
<th>작성자</th>
<th>날짜</th>
</tr>
</thead>
<tbody id="boardBody"></tbody>
</table>
</div>

<div id="viewSection" class="hidden"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBAeV6S7u0PCJ_HIeg19IMx3UbAKS2As-k",
authDomain: "community-61897.firebaseapp.com",
databaseURL: "https://community-61897-default-rtdb.firebaseio.com",
projectId: "community-61897",
storageBucket: "community-61897.firebasestorage.app",
messagingSenderId: "1081865580697",
appId: "1:1081865580697:web:6890110c8db86e0f97c808",
measurementId: "G-8NMHM0H7YQ"
};

let app=null;
let db=null;
let postsRef=null;

function isFirebaseConfigValid(config){
  return config.apiKey !== "여기에_입력" &&
         config.databaseURL !== "여기에_입력" &&
         config.databaseURL.startsWith("https://");
}

if(!isFirebaseConfigValid(firebaseConfig)){
  alert("Firebase 설정이 완료되지 않았습니다.
firebaseConfig 안의 '여기에_입력' 부분을 실제 값으로 바꾸세요.");
}else{
  app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  postsRef = ref(db, "posts");
}

const categories=["전체","공지","잡담","정보","질문","거래","도움"];
let currentCategory="전체";

const categoryBar=document.getElementById("categoryBar");
categories.forEach(cat=>{
const btn=document.createElement("button");
btn.textContent=cat;
btn.onclick=()=>{
currentCategory=cat;
renderPosts(window.latestData);
updateActive();
};
categoryBar.appendChild(btn);
});

function updateActive(){
[...categoryBar.children].forEach(btn=>{
btn.classList.toggle("active",btn.textContent===currentCategory);
});
}
updateActive();

async function sha256(text){
const encoder=new TextEncoder();
const data=encoder.encode(text);
const hash=await crypto.subtle.digest("SHA-256",data);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

window.toggleForm=function(){
document.getElementById("formSection").classList.toggle("hidden");
}

window.addPost=async function(){
const nickname=document.getElementById('nickname').value;
const password=document.getElementById('password').value;
const category=document.getElementById('category').value;
const title=document.getElementById('title').value;
const content=document.getElementById('content').value;
if(!nickname||!password||!title||!content) return alert("모든 항목 입력");
const hashed=await sha256(password);
push(postsRef,{nickname,password:hashed,category,title,content,date:new Date().toLocaleString()});
document.getElementById('title').value="";
document.getElementById('content').value="";
document.getElementById('password').value="";
document.getElementById("formSection").classList.add("hidden");
}

window.viewPost=async function(postId){
const snapshot=await get(ref(db,`posts/${postId}`));
const post=snapshot.val();
const view=document.getElementById('viewSection');
view.innerHTML=`
<div class="post-view">
<button class="back-btn" onclick="backToList()">← 목록으로</button>
<h2>${post.title}</h2>
<div class="post-meta">${post.category} | ${post.nickname} | ${post.date}</div>
<div class="post-content">${post.content}</div>
<br>
<button class="delete-btn" onclick="deletePost('${postId}')">삭제</button>
</div>`;
document.getElementById('listSection').classList.add('hidden');
view.classList.remove('hidden');
}

window.backToList=function(){
document.getElementById('viewSection').classList.add('hidden');
document.getElementById('listSection').classList.remove('hidden');
}

window.deletePost=async function(postId){
const input=prompt("비밀번호 입력");
if(!input)return;
const hashed=await sha256(input);
const snapshot=await get(ref(db,`posts/${postId}`));
if(snapshot.val().password===hashed){
remove(ref(db,`posts/${postId}`));
backToList();
alert("삭제 완료");
}else alert("비밀번호 틀림");
}

function renderPosts(data){
const boardBody=document.getElementById('boardBody');
boardBody.innerHTML="";
if(!data)return;
let entries=Object.entries(data);
if(currentCategory!=="전체"){
entries=entries.filter(([id,post])=>post.category===currentCategory);
}
entries.sort((a,b)=>{
if(a[1].category==="공지"&&b[1].category!=="공지")return -1;
if(a[1].category!=="공지"&&b[1].category==="공지")return 1;
return 0;
});
entries.reverse();
entries.forEach(([postId,post],index)=>{
const tr=document.createElement('tr');
if(post.category==="공지") tr.classList.add('notice-row');
tr.innerHTML=`
<td>${index+1}</td>
<td>${post.category}</td>
<td>${post.title}</td>
<td>${post.nickname}</td>
<td>${post.date}</td>`;
tr.onclick=()=>viewPost(postId);
boardBody.appendChild(tr);
});
}

onValue(postsRef,(snapshot)=>{
window.latestData=snapshot.val();
renderPosts(window.latestData);
});

</script>
</body>
</html>
