<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Realtime Community</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#f4f6f9}
header{background:#4a6cf7;color:white;padding:1rem;text-align:center}
.container{max-width:900px;margin:2rem auto;padding:1rem}
.post-form,.post{background:white;padding:1rem;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:1rem}
.notice{border:2px solid #ff9800}
input,textarea,select{width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid #ccc;border-radius:4px}
button{background:#4a6cf7;color:white;border:none;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer;margin-top:0.3rem;margin-right:4px}
.delete-btn{background:#e53935}
.comment-box{margin-top:0.8rem;padding-left:1rem;border-left:3px solid #eee}
small{color:gray}
.category{background:#eee;padding:2px 6px;border-radius:10px;font-size:12px}
</style>
</head>
<body>
<header>
<h1>🔥 Secure Realtime Community</h1>
<p>SHA‑256 적용 보안 강화 버전</p>
</header>
<div class="container">
<div class="post-form">
<h2>글 작성</h2>
<select id="category">
<option value="공지">공지</option>
<option value="잡담">잡담</option>
<option value="정보">정보</option>
<option value="질문">질문</option>
<option value="거래">거래</option>
<option value="도움">도움</option>
</select>
<input id="nickname" placeholder="닉네임" required>
<input id="password" type="password" placeholder="글 삭제용 비밀번호" required>
<input id="title" placeholder="제목" required>
<textarea id="content" rows="4" placeholder="내용" required></textarea>
<button onclick="addPost()">게시하기</button>
</div>
<div id="postList"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "여기에_입력",
authDomain: "여기에_입력",
databaseURL: "여기에_입력",
projectId: "여기에_입력",
storageBucket: "여기에_입력",
messagingSenderId: "여기에_입력",
appId: "여기에_입력"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const postsRef = ref(db, "posts");

async function sha256(text){
const encoder = new TextEncoder();
const data = encoder.encode(text);
const hash = await crypto.subtle.digest("SHA-256", data);
return Array.from(new Uint8Array(hash))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");
}

window.addPost = async function(){
const nickname=document.getElementById('nickname').value;
const password=document.getElementById('password').value;
const category=document.getElementById('category').value;
const title=document.getElementById('title').value;
const content=document.getElementById('content').value;
if(!nickname||!password||!title||!content)
return alert("모든 항목 입력하세요");

const hashed=await sha256(password);

push(postsRef,{nickname,password:hashed,category,title,content,date:new Date().toLocaleString()});

document.getElementById('title').value="";
document.getElementById('content').value="";
document.getElementById('password').value="";
}

window.deletePost=async function(postId){
const input=prompt("비밀번호 입력");
if(!input)return;
const hashed=await sha256(input);
const snapshot=await get(ref(db,`posts/${postId}`));
const post=snapshot.val();
if(post.password===hashed){
remove(ref(db,`posts/${postId}`));
alert("삭제 완료");
}else alert("비밀번호 틀림");
}

window.addComment=async function(postId){
const text=prompt("댓글 내용");
const pw=prompt("댓글 삭제용 비밀번호");
if(!text||!pw)return;
const hashed=await sha256(pw);
push(ref(db,`posts/${postId}/comments`),{text,password:hashed,date:new Date().toLocaleString()});
}

window.deleteComment=async function(postId,commentId){
const input=prompt("댓글 비밀번호 입력");
if(!input)return;
const hashed=await sha256(input);
const snapshot=await get(ref(db,`posts/${postId}/comments/${commentId}`));
const comment=snapshot.val();
if(comment.password===hashed){
remove(ref(db,`posts/${postId}/comments/${commentId}`));
alert("댓글 삭제 완료");
}else alert("비밀번호 틀림");
}

onValue(postsRef,(snapshot)=>{
const postList=document.getElementById('postList');
postList.innerHTML="";
const data=snapshot.val();
if(!data)return;

const entries=Object.entries(data);
entries.sort((a,b)=>{
if(a[1].category==="공지"&&b[1].category!=="공지")return -1;
if(a[1].category!=="공지"&&b[1].category==="공지")return 1;
return 0;
});

entries.reverse().forEach(([postId,post])=>{
const div=document.createElement('div');
div.className='post';
if(post.category==="공지") div.classList.add('notice');

div.innerHTML=`
<span class="category">${post.category}</span>
<h3>${post.title}</h3>
<small>${post.nickname} | ${post.date}</small>
<p>${post.content}</p>
<button class="delete-btn" onclick="deletePost('${postId}')">글 삭제</button>
<button onclick="addComment('${postId}')">댓글 작성</button>
<div id="comments-${postId}"></div>`;

postList.appendChild(div);

if(post.comments){
Object.entries(post.comments).forEach(([commentId,comment])=>{
const cDiv=document.createElement('div');
cDiv.className='comment-box';
cDiv.innerHTML=`
<p>💬 ${comment.text}</p>
<small>${comment.date}</small>
<button class="delete-btn" onclick="deleteComment('${postId}','${commentId}')">댓글 삭제</button>`;

div.querySelector(`#comments-${postId}`).appendChild(cDiv);
});
}
});
});
</script>
</body>
</html>
